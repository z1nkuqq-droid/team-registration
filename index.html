<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Турнирные заявки — Аквамариновая тема</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a2a3a, #0a3a3a, #0a2a3a);
      color: #bff5ff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(8, 32, 40, 0.9);
      border: 1px solid rgba(0, 255, 200, 0.25);
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    h1, h2, h3 {
      margin-bottom: 14px;
      color: #7fffd4;
    }

    .topbar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .muted {
      color: #7fd4b0;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      color: #4aedd0;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 12px;
      color: #8febd0;
      font-size: 14px;
      font-weight: 500;
    }

    input, select, button {
      width: 100%;
      border: 1px solid #2a6a6a;
      border-radius: 12px;
      background: #0a252a;
      color: #d4f5ff;
      padding: 12px 14px;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #3affd0;
      box-shadow: 0 0 0 3px rgba(58, 255, 208, 0.2);
    }

    button {
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .primary-btn {
      background: linear-gradient(135deg, #1a9f8f, #0d6b6b);
      margin-top: 16px;
      border: none;
      color: white;
      font-size: 16px;
    }

    .secondary-btn {
      background: #1a4a4a;
      border-color: #3a8a8a;
    }

    .danger-btn {
      background: #cc6b4a;
      width: 48px;
      flex: 0 0 48px;
      padding: 0;
      border: none;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .player-item {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .player-number {
      width: 30px;
      text-align: center;
      color: #3affd0;
      font-weight: bold;
    }

    .player-input {
      flex: 1;
    }

    .color-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .color-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: 0.1s;
    }

    .color-btn.selected {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(58, 255, 208, 0.8);
      transform: scale(1.05);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .toolbar button {
      width: auto;
      padding: 10px 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .tab-btn {
      width: auto;
      padding: 10px 16px;
      background: #1a4a4a;
      border: none;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #1a9f8f, #0d6b6b);
      color: white;
      box-shadow: 0 2px 8px rgba(0,255,200,0.3);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .teams-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 500px;
      overflow-y: auto;
    }

    .request-card,
    .team-card-item {
      background: #0a252a;
      border: 1px solid #2a8a7a;
      border-left: 5px solid #3affd0;
      border-radius: 14px;
      padding: 14px;
      transition: 0.2s;
    }

    .team-name-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      align-items: center;
    }

    .team-name {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .team-name strong {
      font-size: 18px;
    }

    .players-list-compact {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }

    .player-chip {
      background: #1a4a5a;
      color: #b0ffe0;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .empty-teams {
      padding: 20px;
      text-align: center;
      color: #7fd4c0;
      background: #0a252a;
      border-radius: 14px;
      border: 1px dashed #2a8a7a;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .filter-btn {
      width: auto;
      padding: 8px 12px;
      background: #1a4a4a;
      font-size: 13px;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #1a9f8f, #0d6b6b);
    }

    .admin-area {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #2a8a7a;
    }

    .date-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .date-row input {
      flex: 1;
      min-width: 180px;
    }

    .date-row button {
      width: auto;
      min-width: 150px;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    
    .admin-btn-accept {
      background: #2a9f6f;
      width: auto;
      padding: 8px 14px;
      font-size: 13px;
      border: none;
      color: white;
    }
    
    .admin-btn-delete {
      background: #cc6b4a;
      width: auto;
      padding: 8px 14px;
      font-size: 13px;
      border: none;
    }
    
    .admin-btn-accept:hover {
      background: #1f8a5f;
    }
    
    .admin-btn-delete:hover {
      background: #b55a3a;
    }

    .password-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-content {
      width: 100%;
      max-width: 380px;
      background: #0a252a;
      border: 1px solid #3affd0;
      border-radius: 20px;
      padding: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* Стиль для сообщений об ошибках */
    .error-message {
      color: #ffaa88;
      background: rgba(200, 80, 40, 0.2);
      padding: 8px;
      border-radius: 8px;
      border-left: 3px solid #ff8866;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="topbar">
        <div>
          <h1>🎮 Турнирные заявки</h1>
          <div class="muted" id="tourDateDisplay">📅 Дата тура: загрузка...</div>
          <div class="status" id="statusPanel">Подключение...</div>
        </div>
        <div class="toolbar">
          <button class="secondary-btn" id="refreshBtn" type="button">🔄 Обновить</button>
          <button class="secondary-btn" id="adminLoginBtn" type="button">🔐 Вход для админа</button>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>📝 Подать заявку</h2>

        <label for="teamName">🏷️ Название команды *</label>
        <input id="teamName" type="text" placeholder="Введите название команды" />

        <label for="gameSelect">🎲 Игра *</label>
        <select id="gameSelect">
          <option value="Dota 2">🎮 Dota 2</option>
          <option value="CS2">🎯 CS2</option>
          <option value="Fortnite">🔫 Fortnite</option>
          <option value="Brawl Stars">⭐ Brawl Stars</option>
          <option value="Valorant">💣 Valorant</option>
          <option value="Clash Royale">👑 Clash Royale</option>
        </select>

        <label>🎨 Цвет команды</label>
        <div class="color-row">
          <button type="button" class="color-btn selected" data-color="#3affd0" style="background:#3affd0;"></button>
          <button type="button" class="color-btn" data-color="#ff6b6b" style="background:#ff6b6b;"></button>
          <button type="button" class="color-btn" data-color="#4d9eff" style="background:#4d9eff;"></button>
          <button type="button" class="color-btn" data-color="#f5a623" style="background:#f5a623;"></button>
          <button type="button" class="color-btn" data-color="#a855f7" style="background:#a855f7;"></button>
          <button type="button" class="color-btn" data-color="#ff66b5" style="background:#ff66b5;"></button>
        </div>

        <label>👥 Игроки (минимум 2) *</label>
        <div id="playersContainer" class="players-list"></div>

        <div class="toolbar">
          <button id="addPlayerBtn" class="secondary-btn" type="button">➕ Добавить игрока</button>
        </div>

        <button id="registerBtn" class="primary-btn" type="button">📨 Отправить заявку</button>
        <div id="resultMsg" class="status"></div>
      </div>

      <div class="panel">
        <h2>📋 Список команд</h2>

        <div class="tabs">
          <button class="tab-btn active" data-tab="pending" type="button">⏳ Новые (<span id="pendingCount">0</span>)</button>
          <button class="tab-btn" data-tab="active" type="button">✅ Активные (<span id="activeCount">0</span>)</button>
        </div>

        <div id="filterPanel" class="admin-area">
          <h3>🔍 Фильтр по игре (админ)</h3>
          <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-game="all" type="button">🌐 Все</button>
            <button class="filter-btn" data-game="Dota 2" type="button">🎮 Dota 2</button>
            <button class="filter-btn" data-game="CS2" type="button">🎯 CS2</button>
            <button class="filter-btn" data-game="Fortnite" type="button">🔫 Fortnite</button>
            <button class="filter-btn" data-game="Brawl Stars" type="button">⭐ Brawl Stars</button>
            <button class="filter-btn" data-game="Valorant" type="button">💣 Valorant</button>
            <button class="filter-btn" data-game="Clash Royale" type="button">👑 Clash Royale</button>
          </div>
        </div>

        <div id="dateEditArea" class="admin-area">
          <h3>📅 Изменить дату тура (админ)</h3>
          <div class="date-row">
            <input id="newDateInput" type="date" />
            <button id="saveDateBtn" class="secondary-btn" type="button">💾 Сохранить дату</button>
          </div>
        </div>

        <div id="pendingTab" class="tab-content active">
          <div id="pendingList" class="teams-list">
            <div class="empty-teams">Загрузка...</div>
          </div>
        </div>

        <div id="activeTab" class="tab-content">
          <div id="activeList" class="teams-list">
            <div class="empty-teams">Загрузка...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== ВАШ URL GOOGLE APPS SCRIPT ====================
    // ⚠️ ВСТАВЬТЕ СЮДА ВАШ ТОЧНЫЙ URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCjMDm8q_RzaoLj5xLW5ItoEOwozKaj-4iHvfyEIDBGVRd6WOmwSrXoKknFFWnCNjYBg/exec";
    
    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let pendingTeams = [];
    let activeTeams = [];
    let tourDate = "";
    let selectedColor = "#3affd0";
    let isAdmin = false;
    let currentGameFilter = "all";

    // DOM элементы
    const teamNameInput = document.getElementById("teamName");
    const gameSelect = document.getElementById("gameSelect");
    const playersContainer = document.getElementById("playersContainer");
    const addPlayerBtn = document.getElementById("addPlayerBtn");
    const registerBtn = document.getElementById("registerBtn");
    const resultMsg = document.getElementById("resultMsg");
    const refreshBtn = document.getElementById("refreshBtn");
    const pendingListDiv = document.getElementById("pendingList");
    const activeListDiv = document.getElementById("activeList");
    const pendingCountSpan = document.getElementById("pendingCount");
    const activeCountSpan = document.getElementById("activeCount");
    const statusPanel = document.getElementById("statusPanel");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const tourDateDisplay = document.getElementById("tourDateDisplay");
    const dateEditArea = document.getElementById("dateEditArea");
    const newDateInput = document.getElementById("newDateInput");
    const saveDateBtn = document.getElementById("saveDateBtn");
    const filterPanel = document.getElementById("filterPanel");
    const filterBar = document.getElementById("filterBar");

    const tabBtns = document.querySelectorAll(".tab-btn");
    const pendingTab = document.getElementById("pendingTab");
    const activeTab = document.getElementById("activeTab");

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function getGameEmoji(game) {
      const emojis = {
        "Dota 2": "🎮", "CS2": "🎯", "Fortnite": "🔫",
        "Brawl Stars": "⭐", "Valorant": "💣", "Clash Royale": "👑"
      };
      return emojis[game] || "🎮";
    }

    function escapeHtml(str) {
      if (!str) return "";
      return String(str).replace(/[&<>]/g, function(m) {
        if (m === "&") return "&amp;";
        if (m === "<") return "&lt;";
        if (m === ">") return "&gt;";
        return m;
      });
    }

    function setMessage(text, isError = false) {
      resultMsg.textContent = text;
      resultMsg.style.color = isError ? "#ffaa88" : "#4aedd0";
      if (isError) {
        resultMsg.classList.add("error-message");
      } else {
        resultMsg.classList.remove("error-message");
      }
      setTimeout(() => {
        if (resultMsg.textContent === text) {
          resultMsg.textContent = "";
          resultMsg.classList.remove("error-message");
        }
      }, 5000);
    }

    function createPlayerRow(num, value = "") {
      const div = document.createElement("div");
      div.className = "player-item";
      const numberSpan = document.createElement("span");
      numberSpan.className = "player-number";
      numberSpan.textContent = num;
      const input = document.createElement("input");
      input.type = "text";
      input.className = "player-input";
      input.placeholder = "Игрок " + num;
      input.value = value;
      const removeBtn = document.createElement("button");
      removeBtn.className = "danger-btn";
      removeBtn.type = "button";
      removeBtn.textContent = "✕";
      removeBtn.onclick = function() {
        div.remove();
        renumberPlayers();
      };
      div.appendChild(numberSpan);
      div.appendChild(input);
      div.appendChild(removeBtn);
      return div;
    }

    function renumberPlayers() {
      const rows = playersContainer.querySelectorAll(".player-item");
      rows.forEach(function(row, idx) {
        const numSpan = row.querySelector(".player-number");
        const inp = row.querySelector(".player-input");
        if (numSpan) numSpan.textContent = idx + 1;
        if (inp) inp.placeholder = "Игрок " + (idx + 1);
      });
    }

    function initPlayers(count = 2) {
      playersContainer.innerHTML = "";
      for (let i = 1; i <= count; i++) {
        playersContainer.appendChild(createPlayerRow(i, ""));
      }
    }

    function setupTabs() {
      tabBtns.forEach(btn => {
        btn.addEventListener("click", function() {
          const tabId = this.getAttribute("data-tab");
          tabBtns.forEach(b => b.classList.remove("active"));
          this.classList.add("active");
          if (tabId === "pending") {
            pendingTab.classList.add("active");
            activeTab.classList.remove("active");
          } else {
            pendingTab.classList.remove("active");
            activeTab.classList.add("active");
          }
        });
      });
    }

    function setupFilters() {
      const filterBtns = filterBar.querySelectorAll(".filter-btn");
      filterBtns.forEach(btn => {
        btn.onclick = function() {
          filterBtns.forEach(b => b.classList.remove("active"));
          this.classList.add("active");
          currentGameFilter = this.getAttribute("data-game");
          renderPending();
        };
      });
    }

    // Выбор цвета
    document.querySelectorAll(".color-btn").forEach(btn => {
      btn.addEventListener("click", function() {
        document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("selected"));
        this.classList.add("selected");
        selectedColor = this.getAttribute("data-color");
      });
    });

    addPlayerBtn.addEventListener("click", function() {
      const count = playersContainer.children.length + 1;
      playersContainer.appendChild(createPlayerRow(count, ""));
      renumberPlayers();
    });

    // ==================== РАБОТА С GOOGLE APPS SCRIPT ====================
    async function callScript(action, data = {}) {
      try {
        const payload = JSON.stringify({ action, ...data });
        console.log(`📤 Отправка [${action}]:`, payload);
        
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: payload,
          redirect: "follow"
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const text = await response.text();
        console.log(`📥 Ответ [${action}]:`, text);
        
        try {
          return JSON.parse(text);
        } catch(e) {
          return { status: "error", message: "Сервер вернул не JSON: " + text.substring(0, 200) };
        }
      } catch(error) {
        console.error(`❌ Ошибка ${action}:`, error);
        return { status: "error", message: error.message };
      }
    }

    async function loadFromSheets() {
      try {
        statusPanel.textContent = "🔄 Загрузка данных...";
        const response = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log("📥 Загружены данные:", data);
        
        if (data.status !== "success") {
          throw new Error(data.message || "Ошибка загрузки");
        }
        
        tourDate = data.tourDate || "не установлена";
        pendingTeams = Array.isArray(data.pending) ? data.pending : [];
        activeTeams = Array.isArray(data.active) ? data.active : [];
        
        tourDateDisplay.textContent = "📅 Дата тура: " + tourDate;
        pendingCountSpan.textContent = pendingTeams.length;
        activeCountSpan.textContent = activeTeams.length;
        statusPanel.textContent = "✅ Данные загружены (" + new Date().toLocaleTimeString() + ")";
        renderAll();
      } catch(error) {
        console.error("❌ Ошибка загрузки:", error);
        statusPanel.textContent = "⚠️ Ошибка: " + error.message;
        pendingTeams = [];
        activeTeams = [];
        renderAll();
      }
    }

    async function saveTourDate(date) {
      const result = await callScript("setDate", { date });
      if (result.status === "success") {
        await loadFromSheets();
        setMessage("✅ Дата тура изменена на " + date);
      } else {
        setMessage("❌ " + (result.message || "Ошибка сохранения даты"), true);
      }
    }

    async function approveTeam(teamId, teamName, game) {
      if (!isAdmin) { setMessage("⛔ Только администратор", true); return; }
      setMessage(`⏳ Одобрение команды "${teamName}"...`);
      const result = await callScript("approveTeam", { id: teamId, teamName: teamName, game: game });
      if (result.status === "success") {
        await loadFromSheets();
        setMessage(`✅ Команда "${teamName}" одобрена`);
      } else {
        setMessage(`❌ Ошибка: ${result.message}`, true);
      }
    }

    async function deleteTeam(teamId, teamName, source, game) {
      if (!isAdmin) { setMessage("⛔ Только администратор", true); return; }
      if (!confirm(`Вы уверены, что хотите удалить команду "${teamName}"?`)) return;
      setMessage(`⏳ Удаление команды "${teamName}"...`);
      const result = await callScript("deleteTeam", { id: teamId, teamName: teamName, source: source, game: game });
      if (result.status === "success") {
        await loadFromSheets();
        setMessage(`🗑️ Команда "${teamName}" удалена`);
      } else {
        setMessage(`❌ Ошибка: ${result.message}`, true);
      }
    }

    // ==================== ОТОБРАЖЕНИЕ ====================
    function renderPending() {
      let filtered = currentGameFilter === "all" 
        ? pendingTeams 
        : pendingTeams.filter(team => team.game === currentGameFilter);
      
      if (filtered.length === 0) {
        pendingListDiv.innerHTML = '<div class="empty-teams">📭 Нет новых заявок</div>';
        return;
      }
      
      let html = "";
      filtered.forEach(team => {
        const teamColor = team.color || "#3affd0";
        const players = Array.isArray(team.players) ? team.players : [];
        const teamId = team.id || "no_id";
        
        html += `<div class="request-card" style="border-left-color: ${teamColor}">`;
        html += `<div class="team-name-header">`;
        html += `<div class="team-name">`;
        html += `<span>${getGameEmoji(team.game)} ${escapeHtml(team.game)}</span>`;
        html += `<strong style="color: ${teamColor}">${escapeHtml(team.teamName)}</strong>`;
        html += `</div>`;
        html += `<span class="muted">${players.length} игроков</span>`;
        html += `</div>`;
        html += `<div class="players-list-compact">`;
        players.forEach(player => {
          html += `<span class="player-chip">⚡ ${escapeHtml(player)}</span>`;
        });
        html += `</div>`;
        html += `<div class="muted" style="margin-top:10px;">📅 ${escapeHtml(team.registeredAt || "")}</div>`;
        
        if (isAdmin) {
          html += `<div class="admin-actions">`;
          html += `<button class="admin-btn-accept" data-id="${escapeHtml(teamId)}" data-name="${escapeHtml(team.teamName)}" data-game="${escapeHtml(team.game)}">✅ Принять</button>`;
          html += `<button class="admin-btn-delete" data-id="${escapeHtml(teamId)}" data-name="${escapeHtml(team.teamName)}" data-source="pending" data-game="${escapeHtml(team.game)}">❌ Удалить</button>`;
          html += `</div>`;
        }
        html += `</div>`;
      });
      
      pendingListDiv.innerHTML = html;
      
      if (isAdmin) {
        document.querySelectorAll('#pendingList .admin-btn-accept').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            approveTeam(btn.dataset.id, btn.dataset.name, btn.dataset.game);
          });
        });
        document.querySelectorAll('#pendingList .admin-btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteTeam(btn.dataset.id, btn.dataset.name, btn.dataset.source, btn.dataset.game);
          });
        });
      }
    }

    function renderActive() {
      if (activeTeams.length === 0) {
        activeListDiv.innerHTML = '<div class="empty-teams">🎯 Нет активных команд</div>';
        return;
      }
      
      let html = "";
      activeTeams.forEach(team => {
        const teamColor = team.color || "#4d9eff";
        const players = Array.isArray(team.players) ? team.players : [];
        const teamId = team.id || "no_id";
        
        html += `<div class="team-card-item" style="border-left-color: ${teamColor}">`;
        html += `<div class="team-name-header">`;
        html += `<div class="team-name">`;
        html += `<span>${getGameEmoji(team.game)} ${escapeHtml(team.game)}</span>`;
        html += `<strong style="color: ${teamColor}">${escapeHtml(team.teamName)}</strong>`;
        html += `</div>`;
        html += `<span class="muted">${players.length} игроков</span>`;
        html += `</div>`;
        html += `<div class="players-list-compact">`;
        players.forEach(player => {
          html += `<span class="player-chip">⚡ ${escapeHtml(player)}</span>`;
        });
        html += `</div>`;
        html += `<div class="muted" style="margin-top:10px;">📅 ${escapeHtml(team.registeredAt || "")}</div>`;
        
        if (isAdmin) {
          html += `<div class="admin-actions">`;
          html += `<button class="admin-btn-delete" data-id="${escapeHtml(teamId)}" data-name="${escapeHtml(team.teamName)}" data-source="active" data-game="${escapeHtml(team.game)}">❌ Удалить</button>`;
          html += `</div>`;
        }
        html += `</div>`;
      });
      
      activeListDiv.innerHTML = html;
      
      if (isAdmin) {
        document.querySelectorAll('#activeList .admin-btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteTeam(btn.dataset.id, btn.dataset.name, btn.dataset.source, btn.dataset.game);
          });
        });
      }
    }

    function renderAll() {
      renderPending();
      renderActive();
      dateEditArea.style.display = isAdmin ? "block" : "none";
      filterPanel.style.display = isAdmin ? "block" : "none";
      adminLoginBtn.textContent = isAdmin ? "👑 Админ активен" : "🔐 Вход для админа";
    }

    // ==================== АДМИН ВХОД ====================
    function showPasswordModal() {
      const modal = document.createElement("div");
      modal.className = "password-modal";
      modal.innerHTML = `
        <div class="modal-content">
          <h3>🔐 Вход для администратора</h3>
          <label for="adminPass">Пароль</label>
          <input type="password" id="adminPass" placeholder="Введите пароль" autocomplete="off" />
          <div class="modal-actions">
            <button id="modalOk" class="primary-btn" type="button">Войти</button>
            <button id="modalCancel" class="secondary-btn" type="button">Отмена</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      
      const input = modal.querySelector("#adminPass");
      const okBtn = modal.querySelector("#modalOk");
      const cancelBtn = modal.querySelector("#modalCancel");
      
      okBtn.onclick = async function() {
        const password = input.value.trim();
        if (!password) { setMessage("❌ Введите пароль", true); return; }
        
        okBtn.disabled = true;
        okBtn.textContent = "⏳ Проверка...";
        
        const result = await callScript("adminLogin", { password });
        
        okBtn.disabled = false;
        okBtn.textContent = "Войти";
        
        if (result.status === "success") {
          isAdmin = true;
          renderAll();
          setMessage("✅ Режим администратора включен");
          modal.remove();
        } else {
          isAdmin = false;
          renderAll();
          setMessage("❌ Неверный пароль", true);
        }
      };
      
      cancelBtn.onclick = function() { modal.remove(); };
      input.addEventListener("keydown", function(e) { if (e.key === "Enter") okBtn.click(); });
      input.focus();
    }

    // ==================== ОТПРАВКА ЗАЯВКИ ====================
    async function sendRequest() {
      const teamName = teamNameInput.value.trim();
      if (!teamName) {
        setMessage("❌ Введите название команды", true);
        teamNameInput.focus();
        return;
      }
      
      const players = [];
      let empty = false;
      document.querySelectorAll(".player-input").forEach(inp => {
        const val = inp.value.trim();
        if (!val) empty = true;
        else players.push(val);
      });
      
      if (empty || players.length < 2) {
        setMessage("❌ Заполните имена всех игроков (минимум 2)", true);
        return;
      }
      
      // Блокируем кнопку
      registerBtn.disabled = true;
      registerBtn.textContent = "⏳ Отправка...";
      
      const newTeam = {
        id: "team_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9),
        teamName: teamName,
        game: gameSelect.value,
        color: selectedColor,
        players: players,
        registeredAt: new Date().toLocaleString("ru-RU")
      };
      
      console.log("📤 Отправка заявки:", newTeam);
      
      const result = await callScript("addTeam", newTeam);
      
      registerBtn.disabled = false;
      registerBtn.textContent = "📨 Отправить заявку";
      
      if (result.status === "success") {
        await loadFromSheets();
        setMessage(`✅ Заявка "${teamName}" успешно отправлена!`);
        
        // Очищаем форму
        teamNameInput.value = "";
        initPlayers(2);
        selectedColor = "#3affd0";
        document.querySelectorAll(".color-btn").forEach(btn => {
          btn.classList.remove("selected");
          if (btn.getAttribute("data-color") === "#3affd0") {
            btn.classList.add("selected");
          }
        });
        
        // Переключаемся на вкладку с новыми заявками
        document.querySelector('.tab-btn[data-tab="pending"]').click();
      } else {
        setMessage(`❌ Ошибка отправки: ${result.message}`, true);
      }
    }

    // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
    refreshBtn.addEventListener("click", async () => {
      await loadFromSheets();
      setMessage("📋 Данные обновлены");
    });
    
    registerBtn.addEventListener("click", sendRequest);
    adminLoginBtn.addEventListener("click", showPasswordModal);
    
    saveDateBtn.addEventListener("click", async () => {
      if (!isAdmin) {
        setMessage("⛔ Только администратор может менять дату", true);
        return;
      }
      const newDate = newDateInput.value;
      if (!newDate) {
        setMessage("❌ Выберите дату", true);
        return;
      }
      const formattedDate = newDate.split("-").reverse().join(".");
      await saveTourDate(formattedDate);
    });
    
    // ==================== ЗАПУСК ====================
    initPlayers(2);
    setupTabs();
    setupFilters();
    loadFromSheets();
  </script>
</body>
</html>
