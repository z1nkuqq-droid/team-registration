<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Турнирная панель | Google Таблица</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#0a0a0f;padding:2rem}
        .container{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:2rem}
        .card{background:#0f0f17;border-radius:1.5rem;border:1px solid #1e293b;overflow:hidden}
        .card-header{background:#0d0d15;padding:1rem 1.5rem;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
        .card-header h2{color:#60a5fa}
        .tour-date{background:#1e293b;padding:0.3rem 1rem;border-radius:2rem;font-size:0.85rem;color:#94a3b8}
        .admin-login-btn{background:#1e293b;border:none;color:#60a5fa;padding:0.3rem 1rem;border-radius:2rem;cursor:pointer}
        .card-body{padding:1.5rem}
        .two-columns{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
        @media(max-width:900px){.two-columns{grid-template-columns:1fr}}
        .input-group{margin-bottom:1rem}
        label{display:block;color:#94a3b8;font-size:0.8rem;margin-bottom:0.3rem}
        .team-name-input,select{width:100%;background:#0a0a10;border:1px solid #1e293b;border-radius:0.8rem;padding:0.7rem;color:white}
        .players-section{background:#0a0a10;border-radius:1rem;padding:1rem;margin-bottom:1rem}
        .players-header{display:flex;justify-content:space-between;margin-bottom:0.5rem}
        .add-btn{background:#1e293b;border:none;color:#60a5fa;padding:0.3rem 1rem;border-radius:2rem;cursor:pointer}
        .players-list{display:flex;flex-direction:column;gap:0.5rem}
        .player-item{display:flex;align-items:center;gap:0.5rem;background:#0f0f17;padding:0.3rem 0.8rem;border-radius:2rem}
        .player-number{background:#1e293b;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem}
        .player-input{flex:1;background:transparent;border:none;color:white}
        .remove-player{background:#2a1a2a;border:none;color:#f87171;width:26px;height:26px;border-radius:50%;cursor:pointer}
        .color-options{display:flex;gap:0.5rem;margin-top:0.5rem}
        .color-btn{width:35px;height:35px;border-radius:50%;cursor:pointer;border:2px solid transparent}
        .color-btn.selected{border-color:white;box-shadow:0 0 0 2px #3b82f6}
        .submit-btn{width:100%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:white;padding:0.8rem;border-radius:2rem;font-weight:bold;cursor:pointer;margin-top:1rem}
        .tabs{display:flex;gap:0.5rem;margin-bottom:1rem;border-bottom:1px solid #1e293b}
        .tab-btn{background:transparent;border:none;color:#64748b;padding:0.5rem 1rem;cursor:pointer}
        .tab-btn.active{background:#1e293b;color:#60a5fa;border-radius:2rem}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .filter-bar{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem}
        .filter-btn{background:#0a0a10;border:1px solid #1e293b;color:#94a3b8;padding:0.2rem 0.8rem;border-radius:2rem;font-size:0.7rem;cursor:pointer}
        .filter-btn.active{background:#3b82f6;color:white}
        .teams-grid{display:flex;flex-direction:column;gap:0.8rem;max-height:500px;overflow-y:auto}
        .request-card,.team-card-item{background:#0a0a10;border-radius:1rem;padding:0.8rem 1rem;border-left:4px solid}
        .team-name-header{display:flex;justify-content:space-between;margin-bottom:0.5rem;flex-wrap:wrap}
        .team-name{font-weight:bold;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .players-list-compact{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem}
        .player-chip{background:#0f0f17;border-radius:2rem;padding:0.2rem 0.6rem;font-size:0.7rem}
        .action-buttons{display:flex;gap:0.5rem;margin-top:0.8rem}
        .accept-btn{background:#22c55e;border:none;color:white;padding:0.2rem 0.8rem;border-radius:1rem;cursor:pointer}
        .delete-btn,.reject-btn{background:#ef4444;border:none;color:white;padding:0.2rem 0.8rem;border-radius:1rem;cursor:pointer}
        .empty-teams{text-align:center;padding:1.5rem;color:#64748b}
        .refresh-btn{background:#0a0a10;border:1px solid #1e293b;color:#60a5fa;padding:0.3rem 1rem;border-radius:2rem;cursor:pointer}
        .status-panel{background:#0a0a10;border-radius:1rem;padding:0.8rem;margin-top:1rem;font-size:0.7rem;color:#64748b}
        .date-edit-area{margin-top:1rem;padding:0.8rem;background:#0a0a10;border-radius:1rem;display:none}
        .date-edit-area input{background:#0a0a10;border:1px solid #1e293b;border-radius:0.5rem;padding:0.4rem;color:white}
        .date-edit-area button{background:#3b82f6;border:none;color:white;padding:0.3rem 1rem;border-radius:0.5rem;cursor:pointer}
        .password-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:#0f0f17;border:1px solid #3b82f6;border-radius:1rem;padding:1.5rem;width:300px;text-align:center}
        .modal-content input{width:100%;padding:0.5rem;margin:1rem 0;background:#0a0a10;border:1px solid #1e293b;border-radius:0.5rem;color:white}
        .modal-content button{background:#3b82f6;border:none;color:white;padding:0.5rem 1rem;border-radius:0.5rem;cursor:pointer;margin:0 0.3rem}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>⚔️ ТУРНИРНАЯ ПАНЕЛЬ</h2>
            <div style="display:flex;gap:1rem;align-items:center">
                <div class="tour-date" id="tourDateDisplay">📅 Дата тура: --</div>
                <button id="adminLoginBtn" class="admin-login-btn">🔐 Вход для админа</button>
            </div>
        </div>
        <div class="card-body">
            <div class="two-columns">
                <div>
                    <h3 style="color:#60a5fa;margin-bottom:1rem">📝 НОВАЯ ЗАЯВКА</h3>
                    <div class="input-group"><label>🏆 НАЗВАНИЕ КОМАНДЫ</label><input type="text" id="teamName" placeholder="Dragon Slayers"></div>
                    <div class="input-group"><label>🎮 ИГРА</label><select id="gameSelect"><option>Dota 2</option><option>CS2</option><option>Fortnite</option><option>Brawl Stars</option><option>Valorant</option><option>Clash Royale</option></select></div>
                    <div class="input-group"><label>🎨 ЦВЕТ КОМАНДЫ</label><div class="color-options" id="colorOptions"><div class="color-btn" style="background:#3b82f6" data-color="#3b82f6"></div><div class="color-btn" style="background:#ef4444" data-color="#ef4444"></div><div class="color-btn" style="background:#10b981" data-color="#10b981"></div><div class="color-btn" style="background:#f59e0b" data-color="#f59e0b"></div><div class="color-btn" style="background:#8b5cf6" data-color="#8b5cf6"></div><div class="color-btn" style="background:#ec489a" data-color="#ec489a"></div></div></div>
                    <div class="players-section"><div class="players-header"><label>👥 ИГРОКИ</label><button type="button" id="addPlayerBtn" class="add-btn">+ Добавить</button></div><div id="playersContainer" class="players-list"></div><small style="color:#64748b;font-size:0.7rem">▸ Минимум 1 игрок</small></div>
                    <button id="registerBtn" class="submit-btn">📨 ОТПРАВИТЬ ЗАЯВКУ</button>
                    <div id="resultMsg" style="margin-top:1rem;font-size:0.8rem;color:#60a5fa"></div>
                </div>
                <div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3 style="color:#60a5fa">⚙️ УПРАВЛЕНИЕ</h3><button id="refreshBtn" class="refresh-btn">🔄 ОБНОВИТЬ</button></div>
                    <div class="tabs"><button class="tab-btn active" data-tab="pending">⏳ ЗАЯВКИ (<span id="pendingCount">0</span>)</button><button class="tab-btn" data-tab="active">✅ АКТИВНЫЕ (<span id="activeCount">0</span>)</button></div>
                    <div id="filterPanel" style="display:none"><div class="filter-bar" id="filterBar"><button class="filter-btn active" data-game="all">🎮 ВСЕ ИГРЫ</button><button class="filter-btn" data-game="Dota 2">Dota 2</button><button class="filter-btn" data-game="CS2">CS2</button><button class="filter-btn" data-game="Fortnite">Fortnite</button><button class="filter-btn" data-game="Brawl Stars">Brawl Stars</button><button class="filter-btn" data-game="Valorant">Valorant</button><button class="filter-btn" data-game="Clash Royale">Clash Royale</button></div></div>
                    <div id="pendingTab" class="tab-content active"><div id="pendingList" class="teams-grid"><div class="empty-teams">Загрузка...</div></div></div>
                    <div id="activeTab" class="tab-content"><div id="activeList" class="teams-grid"><div class="empty-teams">Загрузка...</div></div></div>
                    <div id="dateEditArea" class="date-edit-area"><label>📅 Изменить дату тура:</label><div style="display:flex;gap:0.5rem;margin-top:0.5rem"><input type="date" id="newDateInput"><button id="saveDateBtn">Сохранить</button></div></div>
                    <div class="status-panel" id="statusPanel">🔄 Загрузка данных...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8uSGTb20Uu8UHE-5VmC7ncNhKnsGXJRH5HXuXl_lVY5kdeFmBTVTDQG99BCbe5TmZQg/exec";
    const ADMIN_PASSWORD = "qweasd!@#";
    
    let pendingTeams = [], activeTeams = [], tourDate = "", selectedColor = "#3b82f6", isAdmin = false, currentGameFilter = "all";
    
    const teamNameInput = document.getElementById('teamName');
    const gameSelect = document.getElementById('gameSelect');
    const playersContainer = document.getElementById('playersContainer');
    const addPlayerBtn = document.getElementById('addPlayerBtn');
    const registerBtn = document.getElementById('registerBtn');
    const resultMsg = document.getElementById('resultMsg');
    const refreshBtn = document.getElementById('refreshBtn');
    const pendingListDiv = document.getElementById('pendingList');
    const activeListDiv = document.getElementById('activeList');
    const pendingCountSpan = document.getElementById('pendingCount');
    const activeCountSpan = document.getElementById('activeCount');
    const statusPanel = document.getElementById('statusPanel');
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const tourDateDisplay = document.getElementById('tourDateDisplay');
    const dateEditArea = document.getElementById('dateEditArea');
    const newDateInput = document.getElementById('newDateInput');
    const saveDateBtn = document.getElementById('saveDateBtn');
    const filterPanel = document.getElementById('filterPanel');
    const filterBar = document.getElementById('filterBar');
    
    function getGameEmoji(g){const e={"Dota 2":"🎮","CS2":"🎯","Fortnite":"🔫","Brawl Stars":"⭐","Valorant":"💣","Clash Royale":"👑"};return e[g]||"🎮";}
    function escapeHtml(s){return s?.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))||'';}
    
    const tabBtns = document.querySelectorAll('.tab-btn');
    const pendingTab = document.getElementById('pendingTab');
    const activeTab = document.getElementById('activeTab');
    tabBtns.forEach(btn=>{btn.addEventListener('click',()=>{const tid=btn.getAttribute('data-tab');tabBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(tid==='pending'){pendingTab.classList.add('active');activeTab.classList.remove('active');}else{pendingTab.classList.remove('active');activeTab.classList.add('active');}});});
    
    function setupFilters(){const btns=filterBar.querySelectorAll('.filter-btn');btns.forEach(btn=>{btn.addEventListener('click',()=>{btns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentGameFilter=btn.getAttribute('data-game');renderAll();});});}
    
    document.querySelectorAll('.color-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedColor=btn.getAttribute('data-color');});});document.querySelector('.color-btn').classList.add('selected');
    
    function createPlayerRow(num,val=''){const div=document.createElement('div');div.className='player-item';const span=document.createElement('span');span.className='player-number';span.textContent=num;const inp=document.createElement('input');inp.type='text';inp.className='player-input';inp.placeholder=`Игрок ${num}`;inp.value=val;const rm=document.createElement('button');rm.className='remove-player';rm.textContent='✕';rm.onclick=()=>{div.remove();renumberPlayers();};div.appendChild(span);div.appendChild(inp);div.appendChild(rm);return div;}
    function renumberPlayers(){const rows=playersContainer.querySelectorAll('.player-item');rows.forEach((row,i)=>{row.querySelector('.player-number').textContent=i+1;row.querySelector('.player-input').placeholder=`Игрок ${i+1}`;});}
    function initPlayers(c=2){playersContainer.innerHTML='';for(let i=1;i<=c;i++)playersContainer.appendChild(createPlayerRow(i,''));}initPlayers(2);
    addPlayerBtn.addEventListener('click',()=>{playersContainer.appendChild(createPlayerRow(playersContainer.children.length+1,''));renumberPlayers();});
    
    async function loadFromSheets(){try{statusPanel.innerHTML="🔄 Загрузка...";const res=await fetch(APPS_SCRIPT_URL+"?_="+Date.now());const data=await res.json();tourDate=data.tourDate||"не установлена";tourDateDisplay.innerHTML=`📅 Дата тура: ${tourDate}`;pendingTeams=data.pending||[];activeTeams=data.active||[];statusPanel.innerHTML=`✅ Заявок: ${pendingTeams.length} | Активных: ${activeTeams.length}`;renderAll();}catch(e){statusPanel.innerHTML="⚠️ Ошибка подключения. Проверьте скрипт.";pendingTeams=[];activeTeams=[];renderAll();}}
    
    async function callScript(action,data={}){try{const res=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...data})});return await res.json();}catch(e){return{status:"error"};}}
    
    async function saveTourDate(date){await callScript("setDate",{date});await loadFromSheets();resultMsg.textContent=`✅ Дата тура изменена на ${date}`;setTimeout(()=>resultMsg.textContent="",3000);}
    
    function renderAll(){let filtered=pendingTeams;if(currentGameFilter!=="all")filtered=pendingTeams.filter(t=>t.game===currentGameFilter);pendingCountSpan.textContent=pendingTeams.length;activeCountSpan.textContent=activeTeams.length;dateEditArea.style.display=isAdmin?'block':'none';filterPanel.style.display=isAdmin?'block':'none';if(filtered.length===0){pendingListDiv.innerHTML=pendingTeams.length===0?'<div class="empty-teams">📭 Нет новых заявок</div>':'<div class="empty-teams">🎮 Нет заявок по игре "'+currentGameFilter+'"</div>';}else{pendingListDiv.innerHTML=filtered.map(t=>`<div class="request-card" style="border-left-color:${t.color||'#f59e0b'}"><div class="team-name-header"><div class="team-name"><span>${getGameEmoji(t.game)} ${escapeHtml(t.game)}</span><strong style="color:${t.color||'#f59e0b'}">${escapeHtml(t.teamName)}</strong><span style="background:#1e293b;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:1rem;">⏳ заявка</span></div><span>${t.players.length} игроков</span></div><div class="players-list-compact">${t.players.map(p=>`<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}</div>${isAdmin?`<div class="action-buttons"><button class="accept-btn" onclick="acceptTeam('${t.id}')">✅ ПРИНЯТЬ</button><button class="reject-btn" onclick="deleteTeam('${t.id}',true)">🗑️ ОТКЛОНИТЬ</button></div>`:''}<div style="font-size:0.7rem;color:#64748b">📅 ${escapeHtml(t.registeredAt)}</div></div>`).join('');}if(activeTeams.length===0){activeListDiv.innerHTML='<div class="empty-teams">🎯 Нет активных команд</div>';}else{activeListDiv.innerHTML=activeTeams.map(t=>`<div class="team-card-item" style="border-left-color:${t.color||'#3b82f6'}"><div class="team-name-header"><div class="team-name"><span>${getGameEmoji(t.game)} ${escapeHtml(t.game)}</span><strong style="color:${t.color||'#60a5fa'}">${escapeHtml(t.teamName)}</strong><span style="background:#1e293b;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:1rem;">✅ активна</span></div><span>${t.players.length} игроков</span></div><div class="players-list-compact">${t.players.map(p=>`<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}</div>${isAdmin?`<div class="action-buttons"><button class="delete-btn" onclick="deleteTeam('${t.id}',false)">🗑️ УДАЛИТЬ</button></div>`:''}<div style="font-size:0.7rem;color:#64748b">📅 ${escapeHtml(t.registeredAt)}</div></div>`).join('');}adminLoginBtn.innerHTML=isAdmin?'👑 АДМИН (ВЫ)':'🔐 Вход для админа';}
    
    window.acceptTeam=async(id)=>{if(!isAdmin)return;await callScript("acceptTeam",{id});await loadFromSheets();resultMsg.textContent="✅ Команда принята!";setTimeout(()=>resultMsg.textContent="",2000);};
    window.deleteTeam=async(id,isPending)=>{if(!isAdmin)return;await callScript("deleteTeam",{id,isPending});await loadFromSheets();resultMsg.textContent="🗑️ Команда удалена!";setTimeout(()=>resultMsg.textContent="",2000);};
    
    function showPasswordModal(){const modal=document.createElement('div');modal.className='password-modal';modal.innerHTML=`<div class="modal-content"><h3>🔐 Вход для админа</h3><input type="password" id="adminPass" placeholder="Пароль"><div><button id="modalOk">Войти</button><button id="modalCancel">Отмена</button></div></div>`;document.body.appendChild(modal);const inp=modal.querySelector('#adminPass');modal.querySelector('#modalOk').onclick=()=>{if(inp.value===ADMIN_PASSWORD){isAdmin=true;setupFilters();renderAll();resultMsg.textContent="✅ Добро пожаловать!";}else{resultMsg.textContent="❌ Неверный пароль!";isAdmin=false;renderAll();}modal.remove();};modal.querySelector('#modalCancel').onclick=()=>modal.remove();inp.focus();}
    
    adminLoginBtn.addEventListener('click',showPasswordModal);
    refreshBtn.addEventListener('click',()=>{loadFromSheets();resultMsg.textContent="📋 Обновлено!";setTimeout(()=>resultMsg.textContent="",2000);});
    saveDateBtn.addEventListener('click',async()=>{if(!isAdmin){resultMsg.textContent="⛔ Только админ!";return;}const nd=newDateInput.value;if(nd)await saveTourDate(nd.split('-').reverse().join('.'));else resultMsg.textContent="❌ Выберите дату!";});
    
    async function sendRequest(){const teamName=teamNameInput.value.trim();if(!teamName){resultMsg.textContent="❌ Введите название!";return;}const players=[...document.querySelectorAll('.player-input')].map(i=>i.value.trim()).filter(v=>v);if(players.length===0){resultMsg.textContent="❌ Заполните имена игроков!";return;}await callScript("addTeam",{id:Date.now()+Math.random()*10000,teamName,game:gameSelect.value,color:selectedColor,players,registeredAt:new Date().toLocaleString()});await loadFromSheets();resultMsg.textContent=`📨 Заявка "${teamName}" отправлена!`;teamNameInput.value='';initPlayers(2);selectedColor="#3b82f6";document.querySelectorAll('.color-btn').forEach(btn=>{btn.classList.remove('selected');if(btn.getAttribute('data-color')==="#3b82f6")btn.classList.add('selected');});document.querySelector('.tab-btn[data-tab="pending"]').click();setTimeout(()=>resultMsg.textContent="",3000);}
    
    registerBtn.addEventListener('click',sendRequest);
    loadFromSheets();
</script>
</body>
</html>
