<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Турнирные заявки | Админ-панель</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(10, 25, 47, 0.88);
      border: 1px solid rgba(0, 255, 255, 0.15);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
    }

    h1, h2, h3 {
      margin-bottom: 14px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .muted {
      color: #a0a0ff;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      color: #00ffcc;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 12px;
      color: #c0c0ff;
      font-size: 14px;
    }

    input, select, button {
      width: 100%;
      border: 1px solid #2a4066;
      border-radius: 12px;
      background: #0a1628;
      color: #fff;
      padding: 12px 14px;
      font-size: 15px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #00ffcc;
      box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.2);
    }

    button {
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .primary-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin-top: 16px;
    }

    .secondary-btn {
      background: #1e2a4a;
    }

    .danger-btn {
      background: #dc2626;
      width: 48px;
      flex: 0 0 48px;
      padding: 0;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .player-item {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .player-number {
      width: 30px;
      text-align: center;
      color: #00ffcc;
      font-weight: bold;
    }

    .player-input {
      flex: 1;
    }

    .color-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .color-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
    }

    .color-btn.selected {
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.35);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .toolbar button {
      width: auto;
      padding: 10px 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-btn {
      width: auto;
      padding: 10px 14px;
      background: #1e2a4a;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .teams-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .request-card,
    .team-card-item {
      background: #0a1628;
      border: 1px solid #1e2a4a;
      border-left: 5px solid #3b82f6;
      border-radius: 14px;
      padding: 14px;
      transition: all 0.2s;
    }

    .team-name-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      align-items: center;
    }

    .team-name {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .team-name strong {
      font-size: 18px;
    }

    .players-list-compact {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .player-chip {
      background: #1e2a4a;
      color: #c0c0ff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
    }

    .empty-teams {
      padding: 20px;
      text-align: center;
      color: #a0a0ff;
      background: #0a1628;
      border-radius: 14px;
      border: 1px dashed #2a4066;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .filter-btn {
      width: auto;
      padding: 8px 12px;
      background: #1e2a4a;
      font-size: 14px;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .admin-area {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #2a4066;
    }

    .date-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .date-row input {
      flex: 1;
      min-width: 180px;
    }

    .date-row button {
      width: auto;
      min-width: 150px;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    
    .admin-btn-accept {
      background: #10b981;
      width: auto;
      padding: 8px 14px;
      font-size: 13px;
      border: none;
    }
    
    .admin-btn-delete {
      background: #dc2626;
      width: auto;
      padding: 8px 14px;
      font-size: 13px;
      border: none;
    }
    
    .admin-btn-accept:hover {
      background: #059669;
    }
    
    .admin-btn-delete:hover {
      background: #b91c1c;
    }

    .password-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-content {
      width: 100%;
      max-width: 380px;
      background: #0a1628;
      border: 1px solid #2a4066;
      border-radius: 16px;
      padding: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="topbar">
        <div>
          <h1>🎮 Турнирные заявки</h1>
          <div class="muted" id="tourDateDisplay">📅 Дата тура: загрузка...</div>
          <div class="status" id="statusPanel">Подключение к Google Sheets...</div>
        </div>
        <div class="toolbar">
          <button class="secondary-btn" id="refreshBtn" type="button">🔄 Обновить</button>
          <button class="secondary-btn" id="adminLoginBtn" type="button">🔐 Вход для админа</button>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>📝 Подать заявку</h2>

        <label for="teamName">🏷️ Название команды</label>
        <input id="teamName" type="text" placeholder="Введите название команды" />

        <label for="gameSelect">🎲 Игра</label>
        <select id="gameSelect">
          <option value="Dota 2">🎮 Dota 2</option>
          <option value="CS2">🎯 CS2</option>
          <option value="Fortnite">🔫 Fortnite</option>
          <option value="Brawl Stars">⭐ Brawl Stars</option>
          <option value="Valorant">💣 Valorant</option>
          <option value="Clash Royale">👑 Clash Royale</option>
        </select>

        <label>🎨 Цвет команды</label>
        <div class="color-row">
          <button type="button" class="color-btn selected" data-color="#3b82f6" style="background:#3b82f6;"></button>
          <button type="button" class="color-btn" data-color="#ef4444" style="background:#ef4444;"></button>
          <button type="button" class="color-btn" data-color="#10b981" style="background:#10b981;"></button>
          <button type="button" class="color-btn" data-color="#f59e0b" style="background:#f59e0b;"></button>
          <button type="button" class="color-btn" data-color="#8b5cf6" style="background:#8b5cf6;"></button>
          <button type="button" class="color-btn" data-color="#ec4899" style="background:#ec4899;"></button>
        </div>

        <label>👥 Игроки</label>
        <div id="playersContainer" class="players-list"></div>

        <div class="toolbar">
          <button id="addPlayerBtn" class="secondary-btn" type="button">➕ Добавить игрока</button>
        </div>

        <button id="registerBtn" class="primary-btn" type="button">📨 Отправить заявку</button>
        <div class="status" id="resultMsg"></div>
      </div>

      <div class="panel">
        <h2>📋 Список команд</h2>

        <div class="tabs">
          <button class="tab-btn active" data-tab="pending" type="button">⏳ Новые (<span id="pendingCount">0</span>)</button>
          <button class="tab-btn" data-tab="active" type="button">✅ Активные (<span id="activeCount">0</span>)</button>
        </div>

        <div id="filterPanel" class="admin-area">
          <h3>🔍 Фильтр по игре (админ)</h3>
          <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-game="all" type="button">🌐 Все</button>
            <button class="filter-btn" data-game="Dota 2" type="button">🎮 Dota 2</button>
            <button class="filter-btn" data-game="CS2" type="button">🎯 CS2</button>
            <button class="filter-btn" data-game="Fortnite" type="button">🔫 Fortnite</button>
            <button class="filter-btn" data-game="Brawl Stars" type="button">⭐ Brawl Stars</button>
            <button class="filter-btn" data-game="Valorant" type="button">💣 Valorant</button>
            <button class="filter-btn" data-game="Clash Royale" type="button">👑 Clash Royale</button>
          </div>
        </div>

        <div id="dateEditArea" class="admin-area">
          <h3>📅 Изменить дату тура (админ)</h3>
          <div class="date-row">
            <input id="newDateInput" type="date" />
            <button id="saveDateBtn" class="secondary-btn" type="button">💾 Сохранить дату</button>
          </div>
        </div>

        <div id="pendingTab" class="tab-content active">
          <div id="pendingList" class="teams-list">
            <div class="empty-teams">Загрузка...</div>
          </div>
        </div>

        <div id="activeTab" class="tab-content">
          <div id="activeList" class="teams-list">
            <div class="empty-teams">Загрузка...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMwUC8jRx85AGcRqy853c3jHK8OtJQOR_kR4mfAwynzyduNgLLo0SAXAeD_hBK7nzDIA/exec";

    let pendingTeams = [];
    let activeTeams = [];
    let tourDate = "";
    let selectedColor = "#3b82f6";
    let isAdmin = false;
    let currentGameFilter = "all";

    const teamNameInput = document.getElementById("teamName");
    const gameSelect = document.getElementById("gameSelect");
    const playersContainer = document.getElementById("playersContainer");
    const addPlayerBtn = document.getElementById("addPlayerBtn");
    const registerBtn = document.getElementById("registerBtn");
    const resultMsg = document.getElementById("resultMsg");
    const refreshBtn = document.getElementById("refreshBtn");
    const pendingListDiv = document.getElementById("pendingList");
    const activeListDiv = document.getElementById("activeList");
    const pendingCountSpan = document.getElementById("pendingCount");
    const activeCountSpan = document.getElementById("activeCount");
    const statusPanel = document.getElementById("statusPanel");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const tourDateDisplay = document.getElementById("tourDateDisplay");
    const dateEditArea = document.getElementById("dateEditArea");
    const newDateInput = document.getElementById("newDateInput");
    const saveDateBtn = document.getElementById("saveDateBtn");
    const filterPanel = document.getElementById("filterPanel");
    const filterBar = document.getElementById("filterBar");

    const tabBtns = document.querySelectorAll(".tab-btn");
    const pendingTab = document.getElementById("pendingTab");
    const activeTab = document.getElementById("activeTab");

    function getGameEmoji(game) {
      const emojis = {
        "Dota 2": "🎮",
        "CS2": "🎯",
        "Fortnite": "🔫",
        "Brawl Stars": "⭐",
        "Valorant": "💣",
        "Clash Royale": "👑"
      };
      return emojis[game] || "🎮";
    }

    function escapeHtml(str) {
      if (!str) return "";
      return String(str).replace(/[&<>]/g, function(m) {
        if (m === "&") return "&amp;";
        if (m === "<") return "&lt;";
        if (m === ">") return "&gt;";
        return m;
      });
    }

    function setMessage(text, isError = false) {
      resultMsg.textContent = text;
      resultMsg.style.color = isError ? "#f87171" : "#00ffcc";
      setTimeout(() => {
        if (resultMsg.textContent === text) {
          resultMsg.textContent = "";
        }
      }, 4000);
    }

    function createPlayerRow(num, value = "") {
      const div = document.createElement("div");
      div.className = "player-item";
      const numberSpan = document.createElement("span");
      numberSpan.className = "player-number";
      numberSpan.textContent = num;
      const input = document.createElement("input");
      input.type = "text";
      input.className = "player-input";
      input.placeholder = "Игрок " + num;
      input.value = value;
      const removeBtn = document.createElement("button");
      removeBtn.className = "danger-btn";
      removeBtn.type = "button";
      removeBtn.textContent = "✕";
      removeBtn.onclick = function() {
        div.remove();
        renumberPlayers();
      };
      div.appendChild(numberSpan);
      div.appendChild(input);
      div.appendChild(removeBtn);
      return div;
    }

    function renumberPlayers() {
      const rows = playersContainer.querySelectorAll(".player-item");
      rows.forEach(function(row, idx) {
        const numSpan = row.querySelector(".player-number");
        const inp = row.querySelector(".player-input");
        if (numSpan) numSpan.textContent = idx + 1;
        if (inp) inp.placeholder = "Игрок " + (idx + 1);
      });
    }

    function initPlayers(count = 2) {
      playersContainer.innerHTML = "";
      for (let i = 1; i <= count; i++) {
        playersContainer.appendChild(createPlayerRow(i, ""));
      }
    }

    function setupTabs() {
      tabBtns.forEach(btn => {
        btn.addEventListener("click", function() {
          const tabId = this.getAttribute("data-tab");
          tabBtns.forEach(b => b.classList.remove("active"));
          this.classList.add("active");
          if (tabId === "pending") {
            pendingTab.classList.add("active");
            activeTab.classList.remove("active");
          } else {
            pendingTab.classList.remove("active");
            activeTab.classList.add("active");
          }
        });
      });
    }

    function setupFilters() {
      const filterBtns = filterBar.querySelectorAll(".filter-btn");
      filterBtns.forEach(btn => {
        btn.onclick = function() {
          filterBtns.forEach(b => b.classList.remove("active"));
          this.classList.add("active");
          currentGameFilter = this.getAttribute("data-game");
          renderAll();
        };
      });
    }

    document.querySelectorAll(".color-btn").forEach(btn => {
      btn.addEventListener("click", function() {
        document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("selected"));
        this.classList.add("selected");
        selectedColor = this.getAttribute("data-color");
      });
    });

    addPlayerBtn.addEventListener("click", function() {
      const count = playersContainer.children.length + 1;
      playersContainer.appendChild(createPlayerRow(count, ""));
      renumberPlayers();
    });

    async function callScript(action, data = {}) {
      try {
        const payload = { action, ...data };
        console.log(`📤 Отправка ${action}:`, payload);
        
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        // При no-cors мы не можем прочитать ответ, поэтому делаем обычный запрос
        // Переделаем на обычный CORS запрос
        const response2 = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        
        const text = await response2.text();
        console.log(`📥 Ответ ${action}:`, text);
        
        try {
          return JSON.parse(text);
        } catch (e) {
          return { status: "error", message: "Сервер вернул не JSON: " + text.substring(0, 100) };
        }
      } catch (error) {
        console.error(`❌ Ошибка ${action}:`, error);
        return { status: "error", message: error.message };
      }
    }

    async function loadFromSheets() {
      try {
        statusPanel.textContent = "🔄 Загрузка данных...";
        const response = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
        const text = await response.text();
        console.log("📥 Загрузка данных:", text);
        
        const data = JSON.parse(text);
        if (data.status !== "success") {
          throw new Error(data.message || "Ошибка загрузки");
        }
        
        tourDate = data.tourDate || "не установлена";
        pendingTeams = Array.isArray(data.pending) ? data.pending : [];
        activeTeams = Array.isArray(data.active) ? data.active : [];
        
        tourDateDisplay.textContent = "📅 Дата тура: " + tourDate;
        pendingCountSpan.textContent = pendingTeams.length;
        activeCountSpan.textContent = activeTeams.length;
        statusPanel.textContent = "✅ Данные загружены";
        renderAll();
      } catch (error) {
        console.error("❌ Ошибка загрузки:", error);
        statusPanel.textContent = "⚠️ Ошибка подключения: " + error.message;
        pendingTeams = [];
        activeTeams = [];
        renderAll();
      }
    }

    async function saveTourDate(date) {
      const result = await callScript("setDate", { date });
      if (result.status === "success") {
        await loadFromSheets();
        setMessage("✅ Дата тура изменена на " + date);
      } else {
        setMessage("❌ " + (result.message || "Ошибка сохранения даты"), true);
      }
    }

    async function approveTeam(teamId, teamName, game) {
      if (!isAdmin) {
        setMessage("⛔ Только администратор может одобрять команды", true);
        return;
      }
      
      setMessage(`⏳ Одобрение команды "${teamName}"...`);
      
      const result = await callScript("approveTeam", { 
        id: teamId, 
        teamName: teamName,
        game: game 
      });
      
      if (result.status === "success") {
        await loadFromSheets();
        setMessage(`✅ Команда "${teamName}" одобрена и перемещена в активные`);
      } else {
        setMessage(`❌ Ошибка при одобрении: ${result.message || "неизвестная ошибка"}`, true);
      }
    }

    async function deleteTeam(teamId, teamName, source, game) {
      if (!isAdmin) {
        setMessage("⛔ Только администратор может удалять команды", true);
        return;
      }
      
      if (!confirm(`Вы уверены, что хотите удалить команду "${teamName}" из ${source === "pending" ? "новых" : "активных"}?`)) {
        return;
      }
      
      setMessage(`⏳ Удаление команды "${teamName}"...`);
      
      const result = await callScript("deleteTeam", { 
        id: teamId, 
        teamName: teamName,
        source: source, 
        game: game 
      });
      
      if (result.status === "success") {
        await loadFromSheets();
        setMessage(`🗑️ Команда "${teamName}" удалена из ${source === "pending" ? "новых" : "активных"}`);
      } else {
        setMessage(`❌ Ошибка удаления: ${result.message || "неизвестная ошибка"}`, true);
      }
    }

    function renderPending(filteredPending) {
      if (filteredPending.length === 0) {
        if (pendingTeams.length === 0) {
          pendingListDiv.innerHTML = '<div class="empty-teams">📭 Нет новых заявок</div>';
        } else {
          pendingListDiv.innerHTML = '<div class="empty-teams">🎮 Нет заявок по игре "' + escapeHtml(currentGameFilter) + '"</div>';
        }
        return;
      }
      
      let html = "";
      filteredPending.forEach(team => {
        const teamColor = team.color || "#f59e0b";
        const players = Array.isArray(team.players) ? team.players : [];
        const teamId = team.id || team._id || String(Date.now());
        
        html += '<div class="request-card" style="border-left-color:' + teamColor + '" data-team-id="' + escapeHtml(teamId) + '">';
        html += '<div class="team-name-header">';
        html += '<div class="team-name">';
        html += '<span>' + getGameEmoji(team.game) + ' ' + escapeHtml(team.game) + '</span>';
        html += '<strong style="color:' + teamColor + '">' + escapeHtml(team.teamName) + '</strong>';
        html += '</div>';
        html += '<span class="muted">' + players.length + ' игроков</span>';
        html += '</div>';
        html += '<div class="players-list-compact">';
        players.forEach(player => {
          html += '<span class="player-chip">⚡ ' + escapeHtml(player) + '</span>';
        });
        html += '</div>';
        html += '<div class="muted" style="margin-top:10px;">📅 ' + escapeHtml(team.registeredAt || "") + '</div>';
        
        if (isAdmin) {
          html += '<div class="admin-actions">';
          html += `<button class="admin-btn-accept" data-id="${escapeHtml(teamId)}" data-name="${escapeHtml(team.teamName)}" data-game="${escapeHtml(team.game)}">✅ Принять</button>`;
          html += `<button class="admin-btn-delete" data-id="${escapeHtml(teamId)}" data-name="${escapeHtml(team.teamName)}" data-source="pending" data-game="${escapeHtml(team.game)}">❌ Удалить</button>`;
          html += '</div>';
        }
        html += '</div>';
      });
      
      pendingListDiv.innerHTML = html;
      
      if (isAdmin) {
        document.querySelectorAll('#pendingList .admin-btn-accept').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            const game = btn.getAttribute('data-game');
            approveTeam(id, name, game);
          });
        });
        
        document.querySelectorAll('#pendingList .admin-btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            const source = btn.getAttribute('data-source');
            const game = btn.getAttribute('data-game');
            deleteTeam(id, name, source, game);
          });
        });
      }
    }

    function renderActive() {
      if (activeTeams.length === 0) {
        activeListDiv.innerHTML = '<div class="empty-teams">🎯 Нет активных команд</div>';
        return;
      }
      
      let html = "";
      activeTeams.forEach(team => {
        const teamColor = team.color || "#10b981";
        const players = Array.isArray(team.players) ? team.players : [];
        const teamId = team.id || team._id || String(Date.now());
        
        html += '<div class="team-card-item" style="border-left-color:' + teamColor + '" data-team-id="' + escapeHtml(teamId) + '">';
        html += '<div class="team-name-header">';
        html += '<div class="team-name">';
        html += '<span>' + getGameEmoji(team.game) + ' ' + escapeHtml(team.game) + '</span>';
        html += '<strong style="color:' + teamColor + '">' + escapeHtml(team.teamName) + '</strong>';
        html += '</div>';
        html += '<span class="muted">' + players.length + ' игроков</span>';
        html += '</div>';
        html += '<div class="players-list-compact">';
        players.forEach(player => {
          html += '<span class="player-chip">⚡ ' + escapeHtml(player) + '</span>';
        });
        html += '</div>';
        html += '<div class="muted" style="margin-top:10px;">📅 ' + escapeHtml(team.registeredAt || "") + '</div>';
        
        if (isAdmin) {
          html += '<div class="admin-actions">';
          html += `<button class="admin-btn-delete" data-id="${escapeHtml(teamId)}" data-name="${escapeHtml(team.teamName)}" data-source="active" data-game="${escapeHtml(team.game)}">❌ Удалить из активных</button>`;
          html += '</div>';
        }
        html += '</div>';
      });
      
      activeListDiv.innerHTML = html;
      
      if (isAdmin) {
        document.querySelectorAll('#activeList .admin-btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            const source = btn.getAttribute('data-source');
            const game = btn.getAttribute('data-game');
            deleteTeam(id, name, source, game);
          });
        });
      }
    }

    function renderAll() {
      let filteredPending = pendingTeams;
      if (currentGameFilter !== "all") {
        filteredPending = pendingTeams.filter(team => team.game === currentGameFilter);
      }
      
      pendingCountSpan.textContent = pendingTeams.length;
      activeCountSpan.textContent = activeTeams.length;
      
      if (dateEditArea) dateEditArea.style.display = isAdmin ? "block" : "none";
      if (filterPanel) filterPanel.style.display = isAdmin ? "block" : "none";
      if (adminLoginBtn) adminLoginBtn.textContent = isAdmin ? "👑 Админ активен" : "🔐 Вход для админа";
      
      renderPending(filteredPending);
      renderActive();
    }

    function showPasswordModal() {
      const modal = document.createElement("div");
      modal.className = "password-modal";
      modal.innerHTML = `
        <div class="modal-content">
          <h3>🔐 Вход для админа</h3>
          <label for="adminPass">Пароль</label>
          <input type="password" id="adminPass" placeholder="Введите пароль" />
          <div class="modal-actions">
            <button id="modalOk" class="primary-btn" type="button">Войти</button>
            <button id="modalCancel" class="secondary-btn" type="button">Отмена</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      
      const input = modal.querySelector("#adminPass");
      const okBtn = modal.querySelector("#modalOk");
      const cancelBtn = modal.querySelector("#modalCancel");
      
      okBtn.onclick = async function() {
        const password = input.value.trim();
        if (!password) {
          setMessage("❌ Введите пароль", true);
          return;
        }
        
        okBtn.disabled = true;
        okBtn.textContent = "⏳ Проверка...";
        
        const result = await callScript("adminLogin", { password });
        
        okBtn.disabled = false;
        okBtn.textContent = "Войти";
        
        if (result.status === "success") {
          isAdmin = true;
          renderAll();
          setMessage("✅ Режим администратора включен");
          modal.remove();
        } else {
          isAdmin = false;
          renderAll();
          setMessage("❌ Неверный пароль", true);
        }
      };
      
      cancelBtn.onclick = function() {
        modal.remove();
      };
      
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") okBtn.click();
      });
      
      input.focus();
    }

    async function sendRequest() {
      const teamName = teamNameInput.value.trim();
      if (!teamName) {
        setMessage("❌ Введите название команды", true);
        return;
      }
      
      const players = [];
      let empty = false;
      
      document.querySelectorAll(".player-input").forEach(inp => {
        const val = inp.value.trim();
        if (!val) empty = true;
        else players.push(val);
      });
      
      if (empty || players.length === 0) {
        setMessage("❌ Заполните имена всех игроков", true);
        return;
      }
      
      registerBtn.disabled = true;
      registerBtn.textContent = "⏳ Отправка...";
      
      const newTeam = {
        id: "team_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9),
        teamName: teamName,
        game: gameSelect.value,
        color: selectedColor,
        players: players,
        registeredAt: new Date().toLocaleString("ru-RU")
      };
      
      const result = await callScript("addTeam", newTeam);
      
      registerBtn.disabled = false;
      registerBtn.textContent = "📨 Отправить заявку";
      
      if (result.status !== "success") {
        setMessage("❌ " + (result.message || "Ошибка отправки заявки"), true);
        return;
      }
      
      await loadFromSheets();
      setMessage('✅ Заявка "' + teamName + '" отправлена');
      
      teamNameInput.value = "";
      initPlayers(2);
      selectedColor = "#3b82f6";
      document.querySelectorAll(".color-btn").forEach(btn => {
        btn.classList.remove("selected");
        if (btn.getAttribute("data-color") === "#3b82f6") {
          btn.classList.add("selected");
        }
      });
      
      document.querySelector('.tab-btn[data-tab="pending"]').click();
    }

    refreshBtn.addEventListener("click", async () => {
      await loadFromSheets();
      setMessage("📋 Данные обновлены");
    });
    
    registerBtn.addEventListener("click", sendRequest);
    adminLoginBtn.addEventListener("click", showPasswordModal);
    
    saveDateBtn.addEventListener("click", async () => {
      if (!isAdmin) {
        setMessage("⛔ Только администратор может менять дату", true);
        return;
      }
      
      const newDate = newDateInput.value;
      if (!newDate) {
        setMessage("❌ Выберите дату", true);
        return;
      }
      
      const formattedDate = newDate.split("-").reverse().join(".");
      await saveTourDate(formattedDate);
    });
    
    initPlayers(2);
    setupTabs();
    setupFilters();
    loadFromSheets();
  </script>
</body>
</html>
