<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CyberAdmin | Dota 2 / CS2 управление командами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0c15 0%, #0f1722 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            border: 1px solid rgba(0, 150, 255, 0.25);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(95deg, #0a0f1e, #0a1225);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #1e3a6b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-header h2 {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: #7bc9ff;
        }

        .admin-login-btn {
            background: #1e3a6b;
            border: 1px solid #2f6b9e;
            color: #ffd966;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .admin-login-btn:hover {
            background: #2a4a7a;
            transform: scale(0.97);
        }

        .card-body {
            padding: 2rem;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #b9d0ff;
            font-size: 0.85rem;
        }

        .team-name-input, select {
            width: 100%;
            background: #010a18;
            border: 1.5px solid #1e3a6b;
            border-radius: 1rem;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            color: #eef5ff;
            outline: none;
        }

        .team-name-input:focus, select:focus {
            border-color: #2f7eb6;
            box-shadow: 0 0 0 3px rgba(47, 126, 182, 0.3);
        }

        .players-section {
            background: #0a1020b3;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #1e3555;
        }

        .players-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .add-btn {
            background: #0c2b4b;
            border: 1px solid #2f6b9e;
            color: #9acdff;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
        }

        .add-btn:hover {
            background: #134e7a;
        }

        .players-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #010613;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            border: 1px solid #263665;
        }

        .player-number {
            background: #10253f;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-weight: bold;
            color: #70c8ff;
            font-size: 0.75rem;
        }

        .player-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.6rem 0;
            color: #e2edff;
            font-size: 0.9rem;
            outline: none;
        }

        .remove-player {
            background: #2a1a2a;
            border: none;
            color: #ff8a8a;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .color-options {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.1s;
        }

        .color-btn.selected {
            border-color: white;
            box-shadow: 0 0 0 2px #0a6eb4;
            transform: scale(1.05);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(95deg, #0c3f66, #05243f);
            border: 1px solid #2f82b0;
            color: white;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: linear-gradient(95deg, #135e8f, #063a5c);
            box-shadow: 0 0 12px rgba(30, 144, 255, 0.4);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #1e3a6b;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #8fabc3;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #1e3a6b;
            color: #7bc9ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .teams-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 550px;
            overflow-y: auto;
        }

        .request-card {
            background: #0c1126e0;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            border-left: 5px solid #f59e0b;
        }

        .team-card-item {
            background: #0c1126e0;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            border-left: 5px solid;
        }

        .team-name-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }

        .team-name {
            font-size: 1.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .players-list-compact {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .player-chip {
            background: #030e1f;
            border-radius: 2rem;
            padding: 0.2rem 0.7rem;
            font-size: 0.75rem;
            color: #c0dbff;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .delete-btn {
            background: #4a1a2a;
            border: none;
            color: #ff8a8a;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .accept-btn {
            background: #1a4a3a;
            border: none;
            color: #8affc0;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .empty-teams {
            text-align: center;
            padding: 2rem;
            color: #6b84b0;
            background: #050b18;
            border-radius: 1.2rem;
        }

        .small-note {
            font-size: 0.7rem;
            margin-top: 1rem;
            color: #3f5982;
            text-align: center;
        }

        .refresh-btn {
            background: #071a2b;
            border: 1px solid #2d6d9b;
            color: #82cbff;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            background: #0f2a3a;
        }

        .pending-badge {
            background: #5a4a1a;
            color: #ffcc66;
        }

        .status-panel {
            background: #0a1020;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #5a7a9a;
            border: 1px dashed #2f6b9e;
        }

        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid #2f6b9e;
            border-radius: 1.5rem;
            padding: 2rem;
            width: 320px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            background: #010a18;
            border: 1px solid #1e3a6b;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
        }

        .modal-content button {
            background: #1e3a6b;
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>⚔️ ТУРНИРНАЯ ПАНЕЛЬ</h2>
            <button id="adminLoginBtn" class="admin-login-btn">🔐 Вход для админа</button>
        </div>
        <div class="card-body">
            <div class="two-columns">
                <div>
                    <h3 style="color:#7bc9ff; margin-bottom: 1rem;">📝 НОВАЯ ЗАЯВКА</h3>
                    <div class="input-group">
                        <label>🏆 НАЗВАНИЕ КОМАНДЫ</label>
                        <input type="text" id="teamName" class="team-name-input" placeholder="Например: Dragon Slayers">
                    </div>
                    <div class="input-group">
                        <label>🎮 ИГРА</label>
                        <select id="gameSelect">
                            <option value="Dota 2">Dota 2</option>
                            <option value="CS2">CS2</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>🎨 ЦВЕТ КОМАНДЫ</label>
                        <div class="color-options" id="colorOptions">
                            <div class="color-btn" style="background: #3b82f6;" data-color="#3b82f6"></div>
                            <div class="color-btn" style="background: #ef4444;" data-color="#ef4444"></div>
                            <div class="color-btn" style="background: #10b981;" data-color="#10b981"></div>
                            <div class="color-btn" style="background: #f59e0b;" data-color="#f59e0b"></div>
                            <div class="color-btn" style="background: #8b5cf6;" data-color="#8b5cf6"></div>
                            <div class="color-btn" style="background: #ec489a;" data-color="#ec489a"></div>
                        </div>
                    </div>
                    <div class="players-section">
                        <div class="players-header">
                            <label>👥 ИГРОКИ (минимум 1)</label>
                            <button type="button" id="addPlayerBtn" class="add-btn">+ Добавить</button>
                        </div>
                        <div id="playersContainer" class="players-list"></div>
                    </div>
                    <button id="registerBtn" class="submit-btn">📨 ОТПРАВИТЬ ЗАЯВКУ</button>
                    <div id="resultMsg" style="margin-top: 1rem; font-size: 0.8rem; color: #7bc9ff;"></div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="color:#7bc9ff;">⚙️ УПРАВЛЕНИЕ</h3>
                        <button id="refreshBtn" class="refresh-btn">🔄 ОБНОВИТЬ</button>
                    </div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="pending">⏳ ЗАЯВКИ (<span id="pendingCount">0</span>)</button>
                        <button class="tab-btn" data-tab="active">✅ АКТИВНЫЕ (<span id="activeCount">0</span>)</button>
                    </div>
                    <div id="pendingTab" class="tab-content active">
                        <div id="pendingList" class="teams-grid"><div class="empty-teams">Загрузка...</div></div>
                    </div>
                    <div id="activeTab" class="tab-content">
                        <div id="activeList" class="teams-grid"><div class="empty-teams">Загрузка...</div></div>
                    </div>
                    <div class="status-panel" id="statusPanel">🔄 Подключение к облаку...</div>
                    <div class="small-note">
                        🌐 Все данные синхронизируются в облаке!<br>
                        🔐 Админ: нажмите «Вход для админа» и введите пароль <code style="background:#1a2a3a;padding:2px 6px;border-radius:4px;">qwe123asd</code>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== ОБЛАЧНОЕ ХРАНИЛИЩЕ JSONBin.io ==========
    // Это БЕСПЛАТНЫЙ сервис, данные видны ВСЕМ пользователям!
    const BIN_ID = "675b9e3aacd3cb34a8b6f1a0";  // Мой публичный бин
    const API_KEY = "$2a$10$XxYzAbCdEfGhIjKlMnOpQqRrSsTtUuVvWwXxYyZ";
    
    let pendingTeams = [];
    let activeTeams = [];
    let selectedColor = "#3b82f6";
    let isAdmin = false;
    
    // DOM элементы
    const teamNameInput = document.getElementById('teamName');
    const gameSelect = document.getElementById('gameSelect');
    const playersContainer = document.getElementById('playersContainer');
    const addPlayerBtn = document.getElementById('addPlayerBtn');
    const registerBtn = document.getElementById('registerBtn');
    const resultMsg = document.getElementById('resultMsg');
    const refreshBtn = document.getElementById('refreshBtn');
    const pendingListDiv = document.getElementById('pendingList');
    const activeListDiv = document.getElementById('activeList');
    const pendingCountSpan = document.getElementById('pendingCount');
    const activeCountSpan = document.getElementById('activeCount');
    const statusPanel = document.getElementById('statusPanel');
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    
    // Табы
    const tabBtns = document.querySelectorAll('.tab-btn');
    const pendingTab = document.getElementById('pendingTab');
    const activeTab = document.getElementById('activeTab');
    
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tabId === 'pending') {
                pendingTab.classList.add('active');
                activeTab.classList.remove('active');
            } else {
                pendingTab.classList.remove('active');
                activeTab.classList.add('active');
            }
        });
    });
    
    // Выбор цвета
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedColor = btn.getAttribute('data-color');
        });
    });
    document.querySelector('.color-btn').classList.add('selected');
    
    // Работа со списком игроков
    function createPlayerRow(num, value = '') {
        const div = document.createElement('div');
        div.className = 'player-item';
        const span = document.createElement('span');
        span.className = 'player-number';
        span.textContent = num;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'player-input';
        input.placeholder = `Игрок ${num}`;
        input.value = value;
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-player';
        removeBtn.textContent = '✕';
        removeBtn.onclick = () => {
            div.remove();
            renumberPlayers();
        };
        div.appendChild(span);
        div.appendChild(input);
        div.appendChild(removeBtn);
        return div;
    }
    
    function renumberPlayers() {
        const rows = playersContainer.querySelectorAll('.player-item');
        rows.forEach((row, idx) => {
            const numSpan = row.querySelector('.player-number');
            if (numSpan) numSpan.textContent = idx + 1;
            const inp = row.querySelector('.player-input');
            if (inp) inp.placeholder = `Игрок ${idx + 1}`;
        });
    }
    
    function initPlayers(count = 2) {
        playersContainer.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            playersContainer.appendChild(createPlayerRow(i, ''));
        }
    }
    initPlayers(2);
    
    addPlayerBtn.addEventListener('click', () => {
        const count = playersContainer.children.length + 1;
        playersContainer.appendChild(createPlayerRow(count, ''));
        renumberPlayers();
    });
    
    // ========== ЗАГРУЗКА ИЗ ОБЛАКА ==========
    async function loadFromCloud() {
        try {
            statusPanel.innerHTML = "🔄 Загрузка данных из облака...";
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await response.json();
            
            if (data && data.record) {
                pendingTeams = data.record.pendingTeams || [];
                activeTeams = data.record.activeTeams || [];
                statusPanel.innerHTML = `✅ Облако синхронизировано! Заявок: ${pendingTeams.length} | Активных: ${activeTeams.length}`;
            } else {
                // Первый запуск — создаём демо-данные
                pendingTeams = [
                    { id: 1001, teamName: "Dragon Slayers", game: "Dota 2", color: "#f59e0b", players: ["Alex", "Max", "Ivan"], registeredAt: new Date().toLocaleString(), status: 'pending' },
                    { id: 1002, teamName: "Cyber Knights", game: "CS2", color: "#3b82f6", players: ["John", "Mike", "Tom"], registeredAt: new Date().toLocaleString(), status: 'pending' }
                ];
                activeTeams = [
                    { id: 1, teamName: "Team Spirit", game: "Dota 2", color: "#10b981", players: ["Yatoro", "Collapse", "Mira"], registeredAt: "23.05.2024 14:30", status: 'active' }
                ];
                await saveToCloud();
                statusPanel.innerHTML = "✅ Созданы демо-данные в облаке!";
            }
            renderAll();
        } catch (error) {
            console.error("Ошибка:", error);
            statusPanel.innerHTML = "⚠️ Ошибка подключения к облаку. Проверьте интернет.";
            pendingTeams = [];
            activeTeams = [];
            renderAll();
        }
    }
    
    // ========== СОХРАНЕНИЕ В ОБЛАКО ==========
    async function saveToCloud() {
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify({ pendingTeams: pendingTeams, activeTeams: activeTeams })
            });
            statusPanel.innerHTML = `💾 Сохранено в облако! Заявок: ${pendingTeams.length} | Активных: ${activeTeams.length}`;
        } catch (error) {
            console.error("Ошибка сохранения:", error);
            statusPanel.innerHTML = "⚠️ Ошибка сохранения в облако";
        }
    }
    
    // ========== ОТРИСОВКА ==========
    function renderAll() {
        pendingCountSpan.textContent = pendingTeams.length;
        activeCountSpan.textContent = activeTeams.length;
        
        // Заявки
        if (pendingTeams.length === 0) {
            pendingListDiv.innerHTML = '<div class="empty-teams">📭 Нет новых заявок</div>';
        } else {
            pendingListDiv.innerHTML = pendingTeams.map(team => `
                <div class="request-card" style="border-left-color: ${team.color || '#f59e0b'}">
                    <div class="team-name-header">
                        <div class="team-name">
                            <span>🎮 ${escapeHtml(team.game)}</span>
                            <strong style="color: ${team.color || '#f59e0b'}">${escapeHtml(team.teamName)}</strong>
                            <span class="status-badge pending-badge">⏳ заявка</span>
                        </div>
                        <span>${team.players.length} игроков</span>
                    </div>
                    <div class="players-list-compact">
                        ${team.players.map(p => `<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}
                    </div>
                    ${isAdmin ? `
                    <div class="action-buttons">
                        <button class="accept-btn" onclick="acceptTeam('${team.id}')">✅ ПРИНЯТЬ</button>
                        <button class="reject-btn" onclick="deleteTeam('${team.id}', true)">🗑️ ОТКЛОНИТЬ</button>
                    </div>
                    ` : ''}
                    <div style="font-size:0.7rem; color:#5a7a9a; margin-top:0.5rem;">📅 ${escapeHtml(team.registeredAt)}</div>
                </div>
            `).join('');
        }
        
        // Активные
        if (activeTeams.length === 0) {
            activeListDiv.innerHTML = '<div class="empty-teams">🎯 Нет активных команд</div>';
        } else {
            activeListDiv.innerHTML = activeTeams.map(team => `
                <div class="team-card-item" style="border-left-color: ${team.color || '#3b82f6'}">
                    <div class="team-name-header">
                        <div class="team-name">
                            <span>🎮 ${escapeHtml(team.game)}</span>
                            <strong style="color: ${team.color || '#7bc9ff'}">${escapeHtml(team.teamName)}</strong>
                            <span class="status-badge">✅ активна</span>
                        </div>
                        <span>${team.players.length} игроков</span>
                    </div>
                    <div class="players-list-compact">
                        ${team.players.map(p => `<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}
                    </div>
                    ${isAdmin ? `
                    <div class="action-buttons">
                        <button class="delete-btn" onclick="deleteTeam('${team.id}', false)">🗑️ УДАЛИТЬ</button>
                    </div>
                    ` : ''}
                    <div style="font-size:0.7rem; color:#5a7a9a; margin-top:0.5rem;">📅 ${escapeHtml(team.registeredAt)}</div>
                </div>
            `).join('');
        }
        
        const adminBtn = document.getElementById('adminLoginBtn');
        if (adminBtn) {
            if (isAdmin) {
                adminBtn.innerHTML = '👑 АДМИН (ВЫ)';
                adminBtn.style.background = '#2a4a3a';
            } else {
                adminBtn.innerHTML = '🔐 Вход для админа';
                adminBtn.style.background = '#1e3a6b';
            }
        }
    }
    
    // ========== ДЕЙСТВИЯ АДМИНА ==========
    window.acceptTeam = async function(teamId) {
        if (!isAdmin) { resultMsg.textContent = "⛔ Только администратор!"; return; }
        const idx = pendingTeams.findIndex(t => t.id == teamId);
        if (idx !== -1) {
            const accepted = { ...pendingTeams[idx], status: 'active' };
            activeTeams.push(accepted);
            pendingTeams.splice(idx, 1);
            await saveToCloud();
            await loadFromCloud();
            resultMsg.textContent = "✅ Команда принята!";
        }
    };
    
    window.deleteTeam = async function(teamId, isPending) {
        if (!isAdmin) { resultMsg.textContent = "⛔ Только администратор!"; return; }
        if (isPending) pendingTeams = pendingTeams.filter(t => t.id != teamId);
        else activeTeams = activeTeams.filter(t => t.id != teamId);
        await saveToCloud();
        await loadFromCloud();
        resultMsg.textContent = "🗑️ Команда удалена!";
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // ========== МОДАЛ ПАРОЛЯ ==========
    function showPasswordModal() {
        const modal = document.createElement('div');
        modal.className = 'password-modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="color:#7bc9ff;">🔐 Вход для админа</h3>
                <input type="password" id="adminPass" placeholder="Введите пароль">
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button id="modalOk">Войти</button>
                    <button id="modalCancel">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const input = modal.querySelector('#adminPass');
        modal.querySelector('#modalOk').onclick = () => {
            if (input.value === "qwe123asd") {
                isAdmin = true;
                resultMsg.textContent = "✅ Добро пожаловать, администратор!";
                renderAll();
            } else {
                resultMsg.textContent = "❌ Неверный пароль!";
                isAdmin = false;
                renderAll();
            }
            modal.remove();
        };
        modal.querySelector('#modalCancel').onclick = () => modal.remove();
        input.focus();
    }
    
    adminLoginBtn.addEventListener('click', showPasswordModal);
    
    // ========== ОТПРАВКА ЗАЯВКИ ==========
    async function sendRequest() {
        const teamName = teamNameInput.value.trim();
        if (!teamName) { resultMsg.textContent = "❌ Введите название!"; return; }
        
        const players = [];
        let empty = false;
        document.querySelectorAll('.player-input').forEach(inp => {
            const val = inp.value.trim();
            if (!val) empty = true;
            else players.push(val);
        });
        if (empty || players.length === 0) { resultMsg.textContent = "❌ Заполните имена игроков!"; return; }
        
        const newTeam = {
            id: Date.now() + Math.random() * 10000,
            teamName: teamName,
            game: gameSelect.value,
            color: selectedColor,
            players: players,
            registeredAt: new Date().toLocaleString(),
            status: 'pending'
        };
        
        pendingTeams.push(newTeam);
        await saveToCloud();
        await loadFromCloud();
        resultMsg.textContent = `📨 Заявка "${teamName}" отправлена!`;
        teamNameInput.value = '';
        initPlayers(2);
    }
    
    registerBtn.addEventListener('click', sendRequest);
    refreshBtn.addEventListener('click', () => loadFromCloud());
    
    // Запуск
    loadFromCloud();
</script>
</body>
</html>
