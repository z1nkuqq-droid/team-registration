<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8uSGTb20Uu8UHE-5VmC7ncNhKnsGXJRH5HXuXl_lVY5kdeFmBTVTDQG99BCbe5TmZQg/exec";

let pendingTeams = [];
let activeTeams = [];
let tourDate = "";
let selectedColor = "#3b82f6";
let isAdmin = false;
let currentGameFilter = "all";

const teamNameInput = document.getElementById('teamName');
const gameSelect = document.getElementById('gameSelect');
const playersContainer = document.getElementById('playersContainer');
const addPlayerBtn = document.getElementById('addPlayerBtn');
const registerBtn = document.getElementById('registerBtn');
const resultMsg = document.getElementById('resultMsg');
const refreshBtn = document.getElementById('refreshBtn');
const pendingListDiv = document.getElementById('pendingList');
const activeListDiv = document.getElementById('activeList');
const pendingCountSpan = document.getElementById('pendingCount');
const activeCountSpan = document.getElementById('activeCount');
const statusPanel = document.getElementById('statusPanel');
const adminLoginBtn = document.getElementById('adminLoginBtn');
const tourDateDisplay = document.getElementById('tourDateDisplay');
const dateEditArea = document.getElementById('dateEditArea');
const newDateInput = document.getElementById('newDateInput');
const saveDateBtn = document.getElementById('saveDateBtn');
const filterPanel = document.getElementById('filterPanel');
const filterBar = document.getElementById('filterBar');

function getGameEmoji(game) {
    const emojis = {
        "Dota 2": "🎮",
        "CS2": "🎯",
        "Fortnite": "🔫",
        "Brawl Stars": "⭐",
        "Valorant": "💣",
        "Clash Royale": "👑"
    };
    return emojis[game] || "🎮";
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"]/g, function(m) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[m];
    });
}

async function callScript(action, data = {}) {
    try {
        const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify({ action, ...data })
        });

        const text = await response.text();
        console.log('SERVER RESPONSE:', text);

        try {
            return JSON.parse(text);
        } catch (e) {
            return { status: 'error', message: 'Сервер вернул не JSON', raw: text };
        }
    } catch (error) {
        console.error('Fetch error:', error);
        return { status: 'error', message: error.message };
    }
}

async function loadFromSheets() {
    try {
        statusPanel.textContent = "🔄 Загрузка данных...";
        const response = await fetch(APPS_SCRIPT_URL + '?_=' + Date.now());
        const text = await response.text();
        const data = JSON.parse(text);

        if (data.status !== 'success') {
            throw new Error(data.message || 'Ошибка загрузки');
        }

        tourDate = data.tourDate || 'не установлена';
        pendingTeams = Array.isArray(data.pending) ? data.pending : [];
        activeTeams = Array.isArray(data.active) ? data.active : [];

        tourDateDisplay.textContent = '📅 Дата тура: ' + tourDate;
        pendingCountSpan.textContent = pendingTeams.length;
        activeCountSpan.textContent = activeTeams.length;
        statusPanel.textContent = '✅ Заявок: ' + pendingTeams.length + ' | Активных: ' + activeTeams.length;

        renderAll();
    } catch (error) {
        console.error(error);
        statusPanel.textContent = "⚠️ Ошибка подключения к Google Sheets";
    }
}

function createPlayerRow(num, value = '') {
    const div = document.createElement('div');
    div.className = 'player-item';

    const numberSpan = document.createElement('span');
    numberSpan.className = 'player-number';
    numberSpan.textContent = num;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'player-input';
    input.placeholder = 'Игрок ' + num;
    input.value = value;

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-player';
    removeBtn.type = 'button';
    removeBtn.textContent = '✕';
    removeBtn.onclick = function() {
        div.remove();
        renumberPlayers();
    };

    div.appendChild(numberSpan);
    div.appendChild(input);
    div.appendChild(removeBtn);
    return div;
}

function renumberPlayers() {
    const rows = playersContainer.querySelectorAll('.player-item');
    rows.forEach((row, idx) => {
        row.querySelector('.player-number').textContent = idx + 1;
        row.querySelector('.player-input').placeholder = 'Игрок ' + (idx + 1);
    });
}

function initPlayers(count = 2) {
    playersContainer.innerHTML = '';
    for (let i = 1; i <= count; i++) {
        playersContainer.appendChild(createPlayerRow(i));
    }
}

function renderAll() {
    const filteredPending = currentGameFilter === 'all'
        ? pendingTeams
        : pendingTeams.filter(team => team.game === currentGameFilter);

    dateEditArea.style.display = isAdmin ? 'block' : 'none';
    filterPanel.style.display = isAdmin ? 'block' : 'none';

    if (filteredPending.length === 0) {
        pendingListDiv.innerHTML = '<div class="empty-teams">📭 Нет новых заявок</div>';
    } else {
        pendingListDiv.innerHTML = filteredPending.map(team => `
            <div class="request-card" style="border-left-color:${escapeHtml(team.color || '#f59e0b')}">
                <div class="team-name-header">
                    <div class="team-name">
                        <span>${getGameEmoji(team.game)} ${escapeHtml(team.game)}</span>
                        <strong style="color:${escapeHtml(team.color || '#f59e0b')}">${escapeHtml(team.teamName)}</strong>
                    </div>
                    <span>${Array.isArray(team.players) ? team.players.length : 0} игроков</span>
                </div>
                <div class="players-list-compact">
                    ${(team.players || []).map(p => `<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}
                </div>
                <div style="font-size:0.7rem;color:#64748b;margin-top:0.5rem;">📅 ${escapeHtml(team.registeredAt || '')}</div>
            </div>
        `).join('');
    }

    if (activeTeams.length === 0) {
        activeListDiv.innerHTML = '<div class="empty-teams">🎯 Нет активных команд</div>';
    } else {
        activeListDiv.innerHTML = activeTeams.map(team => `
            <div class="team-card-item" style="border-left-color:${escapeHtml(team.color || '#3b82f6')}">
                <div class="team-name-header">
                    <div class="team-name">
                        <span>${getGameEmoji(team.game)} ${escapeHtml(team.game)}</span>
                        <strong style="color:${escapeHtml(team.color || '#3b82f6')}">${escapeHtml(team.teamName)}</strong>
                    </div>
                    <span>${Array.isArray(team.players) ? team.players.length : 0} игроков</span>
                </div>
                <div class="players-list-compact">
                    ${(team.players || []).map(p => `<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}
                </div>
                <div style="font-size:0.7rem;color:#64748b;margin-top:0.5rem;">📅 ${escapeHtml(team.registeredAt || '')}</div>
            </div>
        `).join('');
    }
}

async function sendRequest() {
    const teamName = teamNameInput.value.trim();
    if (!teamName) {
        resultMsg.textContent = "❌ Введите название команды!";
        resultMsg.style.color = "#f87171";
        return;
    }

    const players = [];
    let hasEmpty = false;
    document.querySelectorAll('.player-input').forEach(inp => {
        const val = inp.value.trim();
        if (!val) hasEmpty = true;
        else players.push(val);
    });

    if (hasEmpty || players.length === 0) {
        resultMsg.textContent = "❌ Заполните имена всех игроков!";
        resultMsg.style.color = "#f87171";
        return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = '⏳ ОТПРАВКА...';

    const payload = {
        id: String(Date.now()),
        teamName,
        game: gameSelect.value,
        color: selectedColor,
        players,
        registeredAt: new Date().toLocaleString('ru-RU')
    };

    const result = await callScript('addTeam', payload);

    registerBtn.disabled = false;
    registerBtn.textContent = '📨 ОТПРАВИТЬ ЗАЯВКУ';

    if (result.status !== 'success') {
        resultMsg.textContent = '❌ ' + (result.message || 'Ошибка отправки заявки');
        resultMsg.style.color = '#f87171';
        return;
    }

    resultMsg.textContent = '✅ Заявка отправлена!';
    resultMsg.style.color = '#60a5fa';

    teamNameInput.value = '';
    initPlayers(2);
    await loadFromSheets();

    setTimeout(() => {
        resultMsg.textContent = '';
    }, 3000);
}

document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        selectedColor = this.dataset.color;
    });
});

document.querySelector('.color-btn')?.classList.add('selected');

addPlayerBtn.addEventListener('click', function() {
    playersContainer.appendChild(createPlayerRow(playersContainer.children.length + 1));
});

refreshBtn.addEventListener('click', loadFromSheets);
registerBtn.addEventListener('click', sendRequest);

initPlayers(2);
loadFromSheets();
</script>
