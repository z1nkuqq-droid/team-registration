<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CyberAdmin | Dota 2 / CS2 управление командами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0c15 0%, #0f1722 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            border: 1px solid rgba(0, 150, 255, 0.25);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(95deg, #0a0f1e, #0a1225);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #1e3a6b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-header h2 {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: #7bc9ff;
        }

        .admin-badge {
            background: #1e3a6b;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: #ffd966;
        }

        .card-body {
            padding: 2rem;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #b9d0ff;
            font-size: 0.85rem;
        }

        .team-name-input, select {
            width: 100%;
            background: #010a18;
            border: 1.5px solid #1e3a6b;
            border-radius: 1rem;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            color: #eef5ff;
            outline: none;
        }

        .team-name-input:focus, select:focus {
            border-color: #2f7eb6;
            box-shadow: 0 0 0 3px rgba(47, 126, 182, 0.3);
        }

        .players-section {
            background: #0a1020b3;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #1e3555;
        }

        .players-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .add-btn {
            background: #0c2b4b;
            border: 1px solid #2f6b9e;
            color: #9acdff;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
        }

        .add-btn:hover {
            background: #134e7a;
        }

        .players-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #010613;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            border: 1px solid #263665;
        }

        .player-number {
            background: #10253f;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-weight: bold;
            color: #70c8ff;
            font-size: 0.75rem;
        }

        .player-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.6rem 0;
            color: #e2edff;
            font-size: 0.9rem;
            outline: none;
        }

        .remove-player {
            background: #2a1a2a;
            border: none;
            color: #ff8a8a;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .color-options {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.1s;
        }

        .color-btn.selected {
            border-color: white;
            box-shadow: 0 0 0 2px #0a6eb4;
            transform: scale(1.05);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(95deg, #0c3f66, #05243f);
            border: 1px solid #2f82b0;
            color: white;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: linear-gradient(95deg, #135e8f, #063a5c);
            box-shadow: 0 0 12px rgba(30, 144, 255, 0.4);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #1e3a6b;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #8fabc3;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #1e3a6b;
            color: #7bc9ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .teams-grid, .requests-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 550px;
            overflow-y: auto;
        }

        .team-card-item {
            background: #0c1126e0;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            border-left: 5px solid;
            transition: 0.1s;
        }

        .request-card {
            background: #0c1126e0;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            border-left: 5px solid #f59e0b;
            opacity: 0.85;
        }

        .team-name-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }

        .team-name {
            font-size: 1.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .players-list-compact {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .player-chip {
            background: #030e1f;
            border-radius: 2rem;
            padding: 0.2rem 0.7rem;
            font-size: 0.75rem;
            color: #c0dbff;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .delete-btn {
            background: #4a1a2a;
            border: none;
            color: #ff8a8a;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .accept-btn {
            background: #1a4a3a;
            border: none;
            color: #8affc0;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .reject-btn {
            background: #4a1a2a;
            border: none;
            color: #ff8a8a;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .empty-teams {
            text-align: center;
            padding: 2rem;
            color: #6b84b0;
            background: #050b18;
            border-radius: 1.2rem;
        }

        .small-note {
            font-size: 0.7rem;
            margin-top: 1rem;
            color: #3f5982;
            text-align: center;
        }

        .refresh-btn {
            background: #071a2b;
            border: 1px solid #2d6d9b;
            color: #82cbff;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            background: #0f2a3a;
        }

        .pending-badge {
            background: #5a4a1a;
            color: #ffcc66;
        }

        .debug-panel {
            background: #0a1020;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #5a7a9a;
            border: 1px dashed #2f6b9e;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>⚔️ ТУРНИРНАЯ АДМИН-ПАНЕЛЬ</h2>
            <div class="admin-badge">👑 АДМИНИСТРАТОР</div>
        </div>
        <div class="card-body">
            <div class="two-columns">
                <!-- Левая колонка: форма регистрации -->
                <div>
                    <h3 style="color:#7bc9ff; margin-bottom: 1rem;">📝 НОВАЯ ЗАЯВКА</h3>
                    <div class="input-group">
                        <label>🏆 НАЗВАНИЕ КОМАНДЫ</label>
                        <input type="text" id="teamName" class="team-name-input" placeholder="Например: Dragon Slayers">
                    </div>

                    <div class="input-group">
                        <label>🎮 ИГРА</label>
                        <select id="gameSelect">
                            <option value="Dota 2">Dota 2</option>
                            <option value="CS2">CS2</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>🎨 ЦВЕТ КОМАНДЫ</label>
                        <div class="color-options" id="colorOptions">
                            <div class="color-btn" style="background: #3b82f6;" data-color="#3b82f6"></div>
                            <div class="color-btn" style="background: #ef4444;" data-color="#ef4444"></div>
                            <div class="color-btn" style="background: #10b981;" data-color="#10b981"></div>
                            <div class="color-btn" style="background: #f59e0b;" data-color="#f59e0b"></div>
                            <div class="color-btn" style="background: #8b5cf6;" data-color="#8b5cf6"></div>
                            <div class="color-btn" style="background: #ec489a;" data-color="#ec489a"></div>
                        </div>
                    </div>

                    <div class="players-section">
                        <div class="players-header">
                            <label>👥 ИГРОКИ (минимум 1)</label>
                            <button type="button" id="addPlayerBtn" class="add-btn">+ Добавить</button>
                        </div>
                        <div id="playersContainer" class="players-list"></div>
                    </div>

                    <button id="registerBtn" class="submit-btn">📨 ОТПРАВИТЬ ЗАЯВКУ</button>
                    <div id="resultMsg" style="margin-top: 1rem; font-size: 0.8rem; color: #7bc9ff;"></div>
                    
                    <!-- Кнопка для тестовой заявки -->
                    <button id="testRequestBtn" style="margin-top: 0.5rem; background: #2a4a3a; border: none; color: white; padding: 0.3rem; border-radius: 1rem; font-size: 0.7rem; cursor: pointer;">📌 ТЕСТОВАЯ ЗАЯВКА (для проверки)</button>
                </div>

                <!-- Правая колонка: управление командами -->
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="color:#7bc9ff;">⚙️ УПРАВЛЕНИЕ</h3>
                        <button id="refreshBtn" class="refresh-btn">🔄 ОБНОВИТЬ</button>
                    </div>
                    
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="pending">⏳ ЗАЯВКИ (<span id="pendingCount">0</span>)</button>
                        <button class="tab-btn" data-tab="active">✅ АКТИВНЫЕ (<span id="activeCount">0</span>)</button>
                    </div>

                    <div id="pendingTab" class="tab-content active">
                        <div id="pendingList" class="teams-grid">
                            <div class="empty-teams">Загрузка...</div>
                        </div>
                    </div>
                    <div id="activeTab" class="tab-content">
                        <div id="activeList" class="teams-grid">
                            <div class="empty-teams">Загрузка...</div>
                        </div>
                    </div>
                    
                    <!-- Панель отладки -->
                    <div class="debug-panel" id="debugPanel">
                        🔧 Статус: подключение к облаку...
                    </div>
                    
                    <div class="small-note">
                        👑 Только администратор может принять или удалить команду.<br>
                        📌 Заявки появляются здесь. После принятия — команда попадает в активные.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== ЛОКАЛЬНОЕ ХРАНИЛИЩЕ (вместо JSONBin) ==========
    // Используем localStorage, но синхронизируем через простой механизм
    // Чтобы разные пользователи видели одни и те же данные, нужно общее хранилище.
    // Временно используем localStorage + демо-данные
    
    let pendingTeams = [];
    let activeTeams = [];
    let selectedColor = "#3b82f6";
    
    // Ключи для localStorage
    const STORAGE_PENDING = 'tournament_pending_teams';
    const STORAGE_ACTIVE = 'tournament_active_teams';
    
    // DOM элементы
    const teamNameInput = document.getElementById('teamName');
    const gameSelect = document.getElementById('gameSelect');
    const playersContainer = document.getElementById('playersContainer');
    const addPlayerBtn = document.getElementById('addPlayerBtn');
    const registerBtn = document.getElementById('registerBtn');
    const testRequestBtn = document.getElementById('testRequestBtn');
    const resultMsg = document.getElementById('resultMsg');
    const refreshBtn = document.getElementById('refreshBtn');
    const pendingListDiv = document.getElementById('pendingList');
    const activeListDiv = document.getElementById('activeList');
    const pendingCountSpan = document.getElementById('pendingCount');
    const activeCountSpan = document.getElementById('activeCount');
    const debugPanel = document.getElementById('debugPanel');
    
    // Табы
    const tabBtns = document.querySelectorAll('.tab-btn');
    const pendingTab = document.getElementById('pendingTab');
    const activeTab = document.getElementById('activeTab');
    
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (tabId === 'pending') {
                pendingTab.classList.add('active');
                activeTab.classList.remove('active');
            } else {
                pendingTab.classList.remove('active');
                activeTab.classList.add('active');
            }
        });
    });
    
    // Выбор цвета
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedColor = btn.getAttribute('data-color');
        });
    });
    document.querySelector('.color-btn').classList.add('selected');
    
    // ========== РАБОТА СО СПИСКОМ ИГРОКОВ ==========
    function createPlayerRow(num, value = '') {
        const div = document.createElement('div');
        div.className = 'player-item';
        const span = document.createElement('span');
        span.className = 'player-number';
        span.textContent = num;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'player-input';
        input.placeholder = `Игрок ${num}`;
        input.value = value;
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-player';
        removeBtn.textContent = '✕';
        removeBtn.onclick = () => {
            div.remove();
            renumberPlayers();
        };
        div.appendChild(span);
        div.appendChild(input);
        div.appendChild(removeBtn);
        return div;
    }
    
    function renumberPlayers() {
        const rows = playersContainer.querySelectorAll('.player-item');
        rows.forEach((row, idx) => {
            const numSpan = row.querySelector('.player-number');
            if (numSpan) numSpan.textContent = idx + 1;
            const inp = row.querySelector('.player-input');
            if (inp) inp.placeholder = `Игрок ${idx + 1}`;
        });
    }
    
    function initPlayers(playersCount = 2) {
        playersContainer.innerHTML = '';
        for (let i = 1; i <= playersCount; i++) {
            playersContainer.appendChild(createPlayerRow(i, ''));
        }
    }
    initPlayers(2);
    
    addPlayerBtn.addEventListener('click', () => {
        const count = playersContainer.children.length + 1;
        playersContainer.appendChild(createPlayerRow(count, ''));
        renumberPlayers();
    });
    
    // ========== ЗАГРУЗКА ИЗ ХРАНИЛИЩА ==========
    function loadData() {
        try {
            const savedPending = localStorage.getItem(STORAGE_PENDING);
            const savedActive = localStorage.getItem(STORAGE_ACTIVE);
            
            if (savedPending) {
                pendingTeams = JSON.parse(savedPending);
            } else {
                // Демо-заявка для наглядности
                pendingTeams = [
                    {
                        id: 1001,
                        teamName: "Dragon Slayers",
                        game: "Dota 2",
                        color: "#f59e0b",
                        players: ["Alex", "Max", "Ivan"],
                        registeredAt: new Date().toLocaleString(),
                        timestamp: Date.now(),
                        status: 'pending'
                    },
                    {
                        id: 1002,
                        teamName: "Cyber Knights",
                        game: "CS2",
                        color: "#3b82f6",
                        players: ["John", "Mike", "Tom", "Jerry"],
                        registeredAt: new Date().toLocaleString(),
                        timestamp: Date.now(),
                        status: 'pending'
                    }
                ];
                saveData();
            }
            
            if (savedActive) {
                activeTeams = JSON.parse(savedActive);
            } else {
                activeTeams = [
                    {
                        id: 1,
                        teamName: "Team Spirit",
                        game: "Dota 2",
                        color: "#10b981",
                        players: ["Yatoro", "Collapse", "Mira", "Larl", "Miposhka"],
                        registeredAt: "23.05.2024 14:30",
                        timestamp: 1716469800000,
                        status: 'active'
                    }
                ];
                saveData();
            }
            
            debugPanel.innerHTML = "✅ Данные загружены из локального хранилища.<br>📋 Заявок: " + pendingTeams.length + " | Активных: " + activeTeams.length;
            renderAll();
        } catch (e) {
            console.error("Ошибка загрузки:", e);
            debugPanel.innerHTML = "❌ Ошибка загрузки: " + e.message;
            pendingTeams = [];
            activeTeams = [];
            renderAll();
        }
    }
    
    // ========== СОХРАНЕНИЕ ==========
    function saveData() {
        localStorage.setItem(STORAGE_PENDING, JSON.stringify(pendingTeams));
        localStorage.setItem(STORAGE_ACTIVE, JSON.stringify(activeTeams));
    }
    
    // ========== ОТРИСОВКА ==========
    function renderAll() {
        pendingCountSpan.textContent = pendingTeams.length;
        activeCountSpan.textContent = activeTeams.length;
        
        // Рендер заявок
        if (pendingTeams.length === 0) {
            pendingListDiv.innerHTML = '<div class="empty-teams">📭 Нет новых заявок</div>';
        } else {
            pendingListDiv.innerHTML = pendingTeams.map(team => `
                <div class="request-card" style="border-left-color: ${team.color || '#f59e0b'}">
                    <div class="team-name-header">
                        <div class="team-name">
                            <span>🎮 ${escapeHtml(team.game)}</span>
                            <strong style="color: ${team.color || '#f59e0b'}">${escapeHtml(team.teamName)}</strong>
                            <span class="status-badge pending-badge">⏳ заявка</span>
                        </div>
                        <span>${team.players.length} игроков</span>
                    </div>
                    <div class="players-list-compact">
                        ${team.players.map(p => `<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}
                    </div>
                    <div class="action-buttons">
                        <button class="accept-btn" onclick="acceptTeam('${team.id}')">✅ ПРИНЯТЬ</button>
                        <button class="reject-btn" onclick="deleteTeam('${team.id}', true)">🗑️ ОТКЛОНИТЬ</button>
                    </div>
                    <div style="font-size:0.7rem; color:#5a7a9a; margin-top:0.5rem;">📅 ${escapeHtml(team.registeredAt)}</div>
                </div>
            `).join('');
        }
        
        // Рендер активных команд
        if (activeTeams.length === 0) {
            activeListDiv.innerHTML = '<div class="empty-teams">🎯 Нет активных команд</div>';
        } else {
            activeListDiv.innerHTML = activeTeams.map(team => `
                <div class="team-card-item" style="border-left-color: ${team.color || '#3b82f6'}">
                    <div class="team-name-header">
                        <div class="team-name">
                            <span>🎮 ${escapeHtml(team.game)}</span>
                            <strong style="color: ${team.color || '#7bc9ff'}">${escapeHtml(team.teamName)}</strong>
                            <span class="status-badge">✅ активна</span>
                        </div>
                        <span>${team.players.length} игроков</span>
                    </div>
                    <div class="players-list-compact">
                        ${team.players.map(p => `<span class="player-chip">⚡ ${escapeHtml(p)}</span>`).join('')}
                    </div>
                    <div class="action-buttons">
                        <button class="delete-btn" onclick="deleteTeam('${team.id}', false)">🗑️ УДАЛИТЬ</button>
                    </div>
                    <div style="font-size:0.7rem; color:#5a7a9a; margin-top:0.5rem;">📅 ${escapeHtml(team.registeredAt)}</div>
                </div>
            `).join('');
        }
    }
    
    // ========== ПРИНЯТЬ КОМАНДУ ==========
    window.acceptTeam = function(teamId) {
        const teamIndex = pendingTeams.findIndex(t => t.id == teamId);
        if (teamIndex !== -1) {
            const acceptedTeam = { ...pendingTeams[teamIndex], status: 'active' };
            activeTeams.push(acceptedTeam);
            pendingTeams.splice(teamIndex, 1);
            saveData();
            renderAll();
            resultMsg.textContent = "✅ Команда принята! Теперь она в активных.";
            resultMsg.style.color = "#8affc0";
            setTimeout(() => resultMsg.textContent = "", 2000);
            debugPanel.innerHTML = "✅ Принята команда. Заявок осталось: " + pendingTeams.length;
        }
    };
    
    // ========== УДАЛИТЬ КОМАНДУ ==========
    window.deleteTeam = function(teamId, isPending) {
        if (isPending) {
            pendingTeams = pendingTeams.filter(t => t.id != teamId);
        } else {
            activeTeams = activeTeams.filter(t => t.id != teamId);
        }
        saveData();
        renderAll();
        resultMsg.textContent = "🗑️ Команда удалена.";
        resultMsg.style.color = "#ff8a8a";
        setTimeout(() => resultMsg.textContent = "", 2000);
        debugPanel.innerHTML = "🗑️ Удалена команда. Заявок: " + pendingTeams.length + " | Активных: " + activeTeams.length;
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== ОТПРАВИТЬ ЗАЯВКУ ==========
    async function sendRequest() {
        const teamName = teamNameInput.value.trim();
        if (!teamName) {
            resultMsg.textContent = "❌ Введите название команды!";
            resultMsg.style.color = "#ff8a8a";
            return;
        }
        
        const game = gameSelect.value;
        
        const playerInputs = playersContainer.querySelectorAll('.player-input');
        const players = [];
        let empty = false;
        playerInputs.forEach(inp => {
            const val = inp.value.trim();
            if (!val) empty = true;
            else players.push(val);
        });
        if (empty || players.length === 0) {
            resultMsg.textContent = "❌ Заполните имена всех игроков!";
            resultMsg.style.color = "#ff8a8a";
            return;
        }
        
        const now = new Date();
        const formattedDate = `${now.toLocaleDateString('ru-RU')} ${now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}`;
        
        const newTeam = {
            id: Date.now() + Math.random() * 10000,
            teamName: teamName,
            game: game,
            color: selectedColor,
            players: players,
            registeredAt: formattedDate,
            timestamp: now.getTime(),
            status: 'pending'
        };
        
        pendingTeams.push(newTeam);
        saveData();
        renderAll();
        
        resultMsg.textContent = `📨 Заявка от "${teamName}" отправлена!`;
        resultMsg.style.color = "#7bc9ff";
        debugPanel.innerHTML = `📨 Новая заявка: ${teamName}. Всего заявок: ${pendingTeams.length}`;
        
        // Очистка формы
        teamNameInput.value = '';
        initPlayers(2);
        selectedColor = "#3b82f6";
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.classList.remove('selected');
            if (btn.getAttribute('data-color') === "#3b82f6") btn.classList.add('selected');
        });
        
        // Переключаемся на вкладку заявок
        document.querySelector('.tab-btn[data-tab="pending"]').click();
    }
    
    // Тестовая заявка
    function sendTestRequest() {
        const testName = "TestTeam_" + Math.floor(Math.random() * 1000);
        const testPlayers = ["Player1", "Player2", "Player3"];
        const now = new Date();
        const formattedDate = `${now.toLocaleDateString('ru-RU')} ${now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}`;
        
        const newTeam = {
            id: Date.now() + Math.random() * 10000,
            teamName: testName,
            game: Math.random() > 0.5 ? "Dota 2" : "CS2",
            color: ["#3b82f6", "#ef4444", "#10b981", "#f59e0b"][Math.floor(Math.random() * 4)],
            players: testPlayers,
            registeredAt: formattedDate,
            timestamp: now.getTime(),
            status: 'pending'
        };
        
        pendingTeams.push(newTeam);
        saveData();
        renderAll();
        resultMsg.textContent = `📨 Тестовая заявка "${testName}" отправлена!`;
        resultMsg.style.color = "#7bc9ff";
        debugPanel.innerHTML = `🧪 Тестовая заявка: ${testName}. Всего заявок: ${pendingTeams.length}`;
        document.querySelector('.tab-btn[data-tab="pending"]').click();
    }
    
    registerBtn.addEventListener('click', sendRequest);
    testRequestBtn.addEventListener('click', sendTestRequest);
    refreshBtn.addEventListener('click', () => {
        loadData();
        resultMsg.textContent = "📋 Данные обновлены!";
        setTimeout(() => resultMsg.textContent = "", 2000);
    });
    
    // Загрузка при старте
    loadData();
</script>
</body>
</html>
