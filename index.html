<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турнирная панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #111827;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1f2937;
        }

        h1, h2, h3 {
            margin-bottom: 15px;
            color: #60a5fa;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid #374151;
            background: #0f172a;
            color: #fff;
        }

        button {
            background: #2563eb;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .players-list, .teams-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-item, .team-card {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #1f2937;
        }

        .player-row {
            display: flex;
            gap: 10px;
        }

        .player-row input {
            margin-bottom: 0;
        }

        .remove-btn {
            width: 50px;
            background: #dc2626;
        }

        .status {
            margin-top: 10px;
            color: #93c5fd;
        }

        .muted {
            color: #94a3b8;
            font-size: 14px;
        }

        .color-options {
            display: flex;
            gap: 10px;
            margin: 10px 0 15px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-btn.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px #3b82f6;
        }

        .team-card strong {
            color: #fff;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .chip {
            background: #1e293b;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: #cbd5e1;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Турнирная панель</h1>
        <div class="muted" id="tourDateDisplay">Дата тура: загрузка...</div>
        <div class="status" id="statusPanel">Подключение к Google Sheets...</div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Новая заявка</h2>

            <label>Название команды</label>
            <input type="text" id="teamName" placeholder="Например: Dragon Slayers">

            <label>Игра</label>
            <select id="gameSelect">
                <option value="Dota 2">Dota 2</option>
                <option value="CS2">CS2</option>
                <option value="Fortnite">Fortnite</option>
                <option value="Brawl Stars">Brawl Stars</option>
                <option value="Valorant">Valorant</option>
                <option value="Clash Royale">Clash Royale</option>
            </select>

            <label>Цвет команды</label>
            <div class="color-options">
                <div class="color-btn selected" style="background:#3b82f6" data-color="#3b82f6"></div>
                <div class="color-btn" style="background:#ef4444" data-color="#ef4444"></div>
                <div class="color-btn" style="background:#10b981" data-color="#10b981"></div>
                <div class="color-btn" style="background:#f59e0b" data-color="#f59e0b"></div>
                <div class="color-btn" style="background:#8b5cf6" data-color="#8b5cf6"></div>
                <div class="color-btn" style="background:#ec489a" data-color="#ec489a"></div>
            </div>

            <h3>Игроки</h3>
            <div id="playersContainer" class="players-list"></div>
            <button type="button" id="addPlayerBtn">Добавить игрока</button>

            <button id="registerBtn">Отправить заявку</button>
            <div class="status" id="resultMsg"></div>
        </div>

        <div class="card">
            <h2>Заявки</h2>
            <button id="refreshBtn">Обновить</button>
            <h3 style="margin-top:15px;">Новые заявки (<span id="pendingCount">0</span>)</h3>
            <div id="pendingList" class="teams-grid">
                <div class="muted">Загрузка...</div>
            </div>

            <h3 style="margin-top:20px;">Активные команды (<span id="activeCount">0</span>)</h3>
            <div id="activeList" class="teams-grid">
                <div class="muted">Загрузка...</div>
            </div>
        </div>
    </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8uSGTb20Uu8UHE-5VmC7ncNhKnsGXJRH5HXuXl_lVY5kdeFmBTVTDQG99BCbe5TmZQg/exec";

let pendingTeams = [];
let activeTeams = [];
let tourDate = "";
let selectedColor = "#3b82f6";

const teamNameInput = document.getElementById('teamName');
const gameSelect = document.getElementById('gameSelect');
const playersContainer = document.getElementById('playersContainer');
const addPlayerBtn = document.getElementById('addPlayerBtn');
const registerBtn = document.getElementById('registerBtn');
const resultMsg = document.getElementById('resultMsg');
const refreshBtn = document.getElementById('refreshBtn');
const pendingListDiv = document.getElementById('pendingList');
const activeListDiv = document.getElementById('activeList');
const pendingCountSpan = document.getElementById('pendingCount');
const activeCountSpan = document.getElementById('activeCount');
const statusPanel = document.getElementById('statusPanel');
const tourDateDisplay = document.getElementById('tourDateDisplay');

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"]/g, function(m) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[m];
    });
}

function createPlayerRow(num, value = '') {
    const wrap = document.createElement('div');
    wrap.className = 'player-row';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'player-input';
    input.placeholder = 'Игрок ' + num;
    input.value = value;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = 'X';
    btn.className = 'remove-btn';
    btn.onclick = function() {
        wrap.remove();
        renumberPlayers();
    };

    wrap.appendChild(input);
    wrap.appendChild(btn);
    return wrap;
}

function renumberPlayers() {
    document.querySelectorAll('.player-row').forEach((row, index) => {
        const input = row.querySelector('.player-input');
        if (input) input.placeholder = 'Игрок ' + (index + 1);
    });
}

function initPlayers(count = 2) {
    playersContainer.innerHTML = '';
    for (let i = 1; i <= count; i++) {
        playersContainer.appendChild(createPlayerRow(i));
    }
}

async function callScript(action, data = {}) {
    try {
        const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify({ action, ...data })
        });

        const text = await response.text();
        console.log(text);

        try {
            return JSON.parse(text);
        } catch (e) {
            return { status: 'error', message: 'Сервер вернул не JSON', raw: text };
        }
    } catch (error) {
        return { status: 'error', message: error.message };
    }
}

async function loadFromSheets() {
    try {
        statusPanel.textContent = 'Загрузка данных...';

        const response = await fetch(APPS_SCRIPT_URL + '?_=' + Date.now());
        const text = await response.text();
        const data = JSON.parse(text);

        if (data.status !== 'success') {
            throw new Error(data.message || 'Ошибка загрузки');
        }

        pendingTeams = Array.isArray(data.pending) ? data.pending : [];
        activeTeams = Array.isArray(data.active) ? data.active : [];
        tourDate = data.tourDate || 'не установлена';

        tourDateDisplay.textContent = 'Дата тура: ' + tourDate;
        pendingCountSpan.textContent = pendingTeams.length;
        activeCountSpan.textContent = activeTeams.length;
        statusPanel.textContent = 'Данные загружены';

        renderTeams();
    } catch (error) {
        console.error(error);
        statusPanel.textContent = 'Ошибка подключения к Google Sheets';
    }
}

function renderTeams() {
    if (pendingTeams.length === 0) {
        pendingListDiv.innerHTML = '<div class="muted">Нет новых заявок</div>';
    } else {
        pendingListDiv.innerHTML = pendingTeams.map(team => `
            <div class="team-card" style="border-left:4px solid ${escapeHtml(team.color || '#3b82f6')}">
                <strong>${escapeHtml(team.teamName)}</strong>
                <div class="muted">${escapeHtml(team.game || '')}</div>
                <div class="chips">
                    ${(team.players || []).map(player => `<span class="chip">${escapeHtml(player)}</span>`).join('')}
                </div>
                <div class="muted" style="margin-top:8px;">${escapeHtml(team.registeredAt || '')}</div>
            </div>
        `).join('');
    }

    if (activeTeams.length === 0) {
        activeListDiv.innerHTML = '<div class="muted">Нет активных команд</div>';
    } else {
        activeListDiv.innerHTML = activeTeams.map(team => `
            <div class="team-card" style="border-left:4px solid ${escapeHtml(team.color || '#10b981')}">
                <strong>${escapeHtml(team.teamName)}</strong>
                <div class="muted">${escapeHtml(team.game || '')}</div>
                <div class="chips">
                    ${(team.players || []).map(player => `<span class="chip">${escapeHtml(player)}</span>`).join('')}
                </div>
                <div class="muted" style="margin-top:8px;">${escapeHtml(team.registeredAt || '')}</div>
            </div>
        `).join('');
    }
}

async function sendRequest() {
    const teamName = teamNameInput.value.trim();

    if (!teamName) {
        resultMsg.textContent = 'Введите название команды';
        return;
    }

    const players = [];
    let emptyExists = false;

    document.querySelectorAll('.player-input').forEach(input => {
        const val = input.value.trim();
        if (!val) emptyExists = true;
        else players.push(val);
    });

    if (emptyExists || players.length === 0) {
        resultMsg.textContent = 'Заполните имена всех игроков';
        return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = 'Отправка...';

    const payload = {
        id: String(Date.now()),
        teamName: teamName,
        game: gameSelect.value,
        color: selectedColor,
        players: players,
        registeredAt: new Date().toLocaleString('ru-RU')
    };

    const result = await callScript('addTeam', payload);

    registerBtn.disabled = false;
    registerBtn.textContent = 'Отправить заявку';

    if (result.status !== 'success') {
        resultMsg.textContent = 'Ошибка: ' + (result.message || 'не удалось отправить');
        return;
    }

    resultMsg.textContent = 'Заявка отправлена';
    teamNameInput.value = '';
    initPlayers(2);
    await loadFromSheets();

    setTimeout(() => {
        resultMsg.textContent = '';
    }, 3000);
}

document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        selectedColor = this.dataset.color;
    });
});

addPlayerBtn.addEventListener('click', function() {
    playersContainer.appendChild(createPlayerRow(playersContainer.children.length + 1));
});

registerBtn.addEventListener('click', sendRequest);
refreshBtn.addEventListener('click', loadFromSheets);

initPlayers(2);
loadFromSheets();
</script>
</body>
</html>
